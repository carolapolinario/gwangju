<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gwangju 5.18</title>
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 10;
      pointer-events: none;
    }
    #controls-hint {
      color: rgba(0,0,0,0.5);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.55);
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.1);
    }
    #vr-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 28px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
    }
    #vr-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); }
    #vr-btn.hidden { display: none; }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      cursor: pointer;
      transition: opacity 0.6s;
    }
    #overlay h1 {
      color: #fff;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
    }
    #overlay p {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    #overlay .enter-btn {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 12px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.2s, background 0.2s;
    }
    #overlay .enter-btn:hover { border-color: #fff; background: rgba(255,255,255,0.06); }

    #lang-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      cursor: pointer;
      padding: 4px 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.7); }
    .lang-btn.active { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.5); }
    .lang-sep { color: rgba(255,255,255,0.2); font-size: 11px; }

    #mobile-notice {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: rgba(255,255,255,0.8);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-align: center;
      text-transform: uppercase;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 40px;
    }
    @media (hover: none) and (pointer: coarse) {
      #mobile-notice { display: flex; }
      #overlay .enter-btn { display: none; }
      #overlay-sub { display: none; }
      #controls-hint { display: none; }
    }

    #lang-hud {
      position: fixed;
      top: 24px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    .lang-hud-btn {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.4);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .lang-hud-btn:hover { background: rgba(255,255,255,0.8); color: rgba(0,0,0,0.7); }
    .lang-hud-btn.active { background: rgba(0,0,0,0.65); color: #fff; border-color: transparent; }
    .lang-hud-sep { color: rgba(0,0,0,0.2); font-size: 10px; }

    #click-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,0,0,0.5);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.55);
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.1);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #click-hint.visible { opacity: 1; }

    /* Lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 0;
      padding: 64px 32px 72px;
      box-sizing: border-box;
    }
    #lightbox-img-wrap {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    #lightbox-img {
      max-height: 100%;
      max-width: 60vw;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 80px rgba(0,0,0,0.8);
      cursor: default;
      display: block;
    }
    #lightbox-text {
      display: none;
      flex: 0 0 360px;
      height: 100%;
      overflow-y: auto;
      padding: 8px 0 8px 40px;
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    #lightbox-text.visible { display: block; }
    #lightbox-text::-webkit-scrollbar { width: 4px; }
    #lightbox-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    #lightbox-text h2 {
      color: #fff;
      font-family: serif;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    #lightbox-text .lb-date {
      color: rgba(255,255,255,0.45);
      font-family: serif;
      font-style: italic;
      font-size: 14px;
      margin-bottom: 18px;
    }
    #lightbox-text .lb-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.15);
      margin: 0 0 18px;
    }
    #lightbox-text p {
      color: rgba(255,255,255,0.8);
      font-family: serif;
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 14px;
    }
    #lightbox-text .lb-legend {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0.04em;
    }
    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 28px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      pointer-events: all;
      z-index: 10;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-nav {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
    }
    #lightbox-nav button {
      background: rgba(255,255,255,0.07);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 7px 20px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
    }
    #lightbox-nav button:hover { background: rgba(255,255,255,0.15); }
    #lightbox-counter {
      position: absolute;
      top: 22px;
      left: 28px;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 0.2em;
      font-family: 'Courier New', monospace;
    }

    #touch-controls {
      display: none;
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      flex-direction: row;
      gap: 12px;
      z-index: 10;
    }
    .touch-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.85);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .touch-btn:active { background: rgba(255,255,255,0.35); }

    @media (max-width: 768px) {
      #touch-controls { display: flex; }
      #controls-hint { display: none; }

      #overlay h1 { font-size: 1.4rem; letter-spacing: 0.15em; }
      #overlay { gap: 14px; }

      #lang-hud { top: auto; bottom: 24px; right: auto; left: 16px; }

      #click-hint { bottom: 170px; font-size: 11px; }

      #ui { bottom: 20px; }

      #lightbox-inner {
        flex-direction: column;
        padding: 52px 12px 60px;
        gap: 12px;
        overflow-y: auto;
      }
      #lightbox-img-wrap { flex: 0 0 auto; height: auto; width: 100%; }
      #lightbox-img {
        max-width: 100% !important;
        max-height: 40vh;
        width: 100%;
        object-fit: contain;
      }
      #lightbox-text {
        flex: none;
        width: 100%;
        height: auto;
        max-height: none;
        padding: 0 4px;
        overflow-y: visible;
      }
      #lightbox-text h2 { font-size: 17px; }
      #lightbox-text .lb-date { font-size: 13px; }
      #lightbox-text p { font-size: 13px; line-height: 1.65; }
      #lightbox-text .lb-legend { font-size: 10px; }
      #lightbox-close { top: 12px; right: 14px; font-size: 11px; }
      #lightbox-counter { top: 14px; left: 14px; font-size: 10px; }
      #lightbox-nav { bottom: 10px; gap: 8px; }
      #lightbox-nav button { padding: 6px 14px; font-size: 10px; }
    }
  </style>
</head>

<script>
(function() {
  const LANG_KEY = 'gwangju_lang';
  const saved = localStorage.getItem(LANG_KEY) || 'fr';
  window._vrCurrentLang = saved;

  const mobileNotice = {
    fr: "Cette expérience est disponible uniquement sur l'ordinateur.",
    en: "This experience is only available on desktop.",
    ko: "이 경험은 데스크탑에서만 이용 가능합니다.",
  };

  function setActiveLangBtns(code) {
    document.querySelectorAll('.lang-btn, .lang-hud-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === code);
    });
  }

  const uiStrings = {
    fr: { sub: 'Avancez · Regardez à droite.', enter: 'Entrer', controls: 'W ou Z / S · Touches Fléchées · Souris', hint: 'Cliquez sur un panneau' },
    en: { sub: 'Move forward · Look right.',   enter: 'Enter',  controls: 'W or Z / S · Arrow Keys · Mouse',        hint: 'Click a panel to view' },
    ko: { sub: '앞으로 이동 · 오른쪽을 보세요.', enter: '입장',   controls: 'W / S · 방향키 · 마우스',                  hint: '패널을 클릭하세요' },
  };

  window._vrLang = function(code) {
    if (!code) code = 'fr';
    window._vrCurrentLang = code;
    localStorage.setItem(LANG_KEY, code);
    setActiveLangBtns(code);
    const notice = document.getElementById('mobile-notice');
    if (notice) notice.textContent = mobileNotice[code] || mobileNotice.fr;
    const ui = uiStrings[code] || uiStrings.fr;
    const sub = document.getElementById('overlay-sub');
    if (sub) sub.textContent = ui.sub;
    const enterBtn = document.getElementById('enter-btn');
    if (enterBtn) enterBtn.textContent = ui.enter;
    const controlsHint = document.getElementById('controls-hint');
    if (controlsHint) controlsHint.textContent = ui.controls;
    const clickHint = document.getElementById('click-hint');
    if (clickHint) clickHint.textContent = ui.hint;
    if (typeof window._vrApplyLangFull === 'function') {
      window._vrApplyLangFull(code);
    }
  };

  window._vrApplyLangFull = null;

  document.querySelectorAll('.lang-btn, .lang-hud-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      window._vrLang(btn.dataset.lang);
    });
  });

  // apply saved lang immediately (buttons + mobile notice text)
  window._vrLang(saved);

  // overlay dismiss — independent of Three.js module
  window._vrSceneActive = false;
  function dismissOverlay() {
    const overlay = document.getElementById('overlay');
    if (!overlay || overlay.style.display === 'none') return;
    overlay.style.opacity = '0';
    setTimeout(function() {
      overlay.style.display = 'none';
      window._vrSceneActive = true;
    }, 600);
  }
  const _enterBtn = document.getElementById('enter-btn');
  if (_enterBtn) {
    _enterBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      dismissOverlay();
    });
  }
  const _overlay = document.getElementById('overlay');
  if (_overlay) {
    _overlay.addEventListener('click', dismissOverlay);
  }
})();
</script>

<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb8b4ae);
scene.fog = new THREE.Fog(0xb0aca6, 15, 35);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.65, 0);

const CORRIDOR_LENGTH = 80;
const CORRIDOR_WIDTH  = 9;
const WALL_HEIGHT     = 7.0;

const floorMat     = new THREE.MeshStandardMaterial({ color: 0xa07848, roughness: 0.92 });
const ceilMat      = new THREE.MeshStandardMaterial({ color: 0xd0ccc6, roughness: 1.0 });
const wallMat      = new THREE.MeshStandardMaterial({ color: 0x9c9990, roughness: 0.85 });
const wallOtherMat = new THREE.MeshStandardMaterial({ color: 0x888580, roughness: 0.88 });

function box(w, h, d, mat, rx=0, ry=0, rz=0, x=0, y=0, z=0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.rotation.set(rx, ry, rz);
  m.position.set(x, y, z);
  scene.add(m);
  return m;
}

// structure
box(CORRIDOR_WIDTH + 8, 0.02, CORRIDOR_LENGTH, floorMat,     0,0,0, 0, 0,           -CORRIDOR_LENGTH/2);
box(CORRIDOR_WIDTH + 8, 0.15, CORRIDOR_LENGTH, ceilMat,      0,0,0, 0, WALL_HEIGHT, -CORRIDOR_LENGTH/2);

const rightWallX = CORRIDOR_WIDTH / 2;
box(0.15, WALL_HEIGHT, CORRIDOR_LENGTH, wallMat,      0,0,0, rightWallX, WALL_HEIGHT/2, -CORRIDOR_LENGTH/2);
box(CORRIDOR_WIDTH, WALL_HEIGHT, 0.15,  wallOtherMat, 0,0,0, 0, WALL_HEIGHT/2, -CORRIDOR_LENGTH);
box(CORRIDOR_WIDTH, WALL_HEIGHT, 0.15,  wallOtherMat, 0,0,0, 0, WALL_HEIGHT/2, 0.1);
box(0.05, 0.15, CORRIDOR_LENGTH, new THREE.MeshStandardMaterial({color:0xb0aca6}),
    0,0,0, rightWallX - 0.1, 0.075, -CORRIDOR_LENGTH/2);

const leftWallX = -CORRIDOR_WIDTH / 2;
box(0.15, WALL_HEIGHT, CORRIDOR_LENGTH, wallMat, 0,0,0, leftWallX, WALL_HEIGHT/2, -CORRIDOR_LENGTH/2);

// lighting 
scene.add(new THREE.AmbientLight(0xc8d4dc, 0.9));
const sun = new THREE.DirectionalLight(0xfff0cc, 2.8);
sun.position.set(-2, 12, -8);
sun.castShadow = false;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xe8ddc8, 0x906840, 0.4));

// panels
const wallSurface = rightWallX - 0.075 - 0.002;
const panelMeshes = [];
const panelImages = [];

const LW = 1.8, LH = 2.2;
const SW = 0.9, SH = 1.1;
const GAP = 0.15, SEC_GAP = 1.8;
const BOARD_Y  = LH / 2 + 0.9;
const SBOARD_Y = SH / 2 + 0.9;

// canvas texture for description panels 
function makeDescTexture(title, date, description) {
  const cw = 512, ch = 640;
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');

  ctx.fillStyle = '#f0ece3';
  ctx.fillRect(0, 0, cw, ch);

  ctx.strokeStyle = '#2a2825';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(48, 72); ctx.lineTo(cw - 48, 72); ctx.stroke();

  // title -- claude fix 
  ctx.fillStyle = '#1a1714';
  ctx.font = 'bold 52px serif';
  ctx.textAlign = 'left';
  ctx.fillText(title, 48, 140);

  // date (if any)
  if (date) {
    ctx.fillStyle = '#7a6e60';
    ctx.font = 'italic 28px serif';
    ctx.fillText(date, 48, 185);
  }

  // divider
  ctx.strokeStyle = '#c0b8a8';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(48, 220); ctx.lineTo(cw - 48, 220); ctx.stroke();

  // description — word-wrapped
  ctx.fillStyle = '#3a3530';
  ctx.font = '26px serif';
  ctx.textAlign = 'left';
  const words = description.split(' ');
  const maxW = cw - 96;
  let line = '', y = 275;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, 48, y);
      line = word; y += 38;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, 48, y);

  // bottom rule
  ctx.strokeStyle = '#2a2825';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(48, ch - 60); ctx.lineTo(cw - 48, ch - 60); ctx.stroke();

  // small footer label
  ctx.fillStyle = '#9a9080';
  ctx.font = '18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Gwangju · 5.18', cw / 2, ch - 30);

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// canvas texture for picture panels 
function makePictureTexture(number) {
  const cw = 512, ch = 640;
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');

  ctx.fillStyle = '#1e1c1a';
  ctx.fillRect(0, 0, cw, ch);

  // outer frame
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.strokeRect(24, 24, cw - 48, ch - 48);

  // inner frame
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.strokeRect(36, 36, cw - 72, ch - 72);

  // panel number
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '22px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(number).padStart(2, '0'), cw / 2, ch / 2);

  ctx.textBaseline = 'alphabetic';
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

let cursor = -1.5;
let picCounter = 1;
const descPanelMap = {};

function panel(type, imgUrl, sectionIdx) {
  const w = type === 'large' ? LW : SW;
  const h = type === 'large' ? LH : SH;
  const y = type === 'large' ? BOARD_Y : SBOARD_Y;
  cursor -= w / 2;

  let tex;
  if (type === 'small' && sectionIdx !== undefined) {
    const s = sections[sectionIdx];
    tex = makeDescTexture(s.title, s.date, s.desc);
  } else {
    tex = makePictureTexture(picCounter++);
  }

  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.88 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.rotation.y = -Math.PI / 2;
  mesh.position.set(wallSurface, y, cursor);
  scene.add(mesh);

  mesh.userData.imgUrl   = imgUrl;
  mesh.userData.panelIdx = panelImages.length;
  mesh.userData.baseColor = null;
  if (type === 'small' && sectionIdx !== undefined) {
    descPanelMap[panelImages.length] = sectionIdx;
  }
  panelMeshes.push(mesh);
  panelImages.push(imgUrl);

  cursor -= w / 2 + GAP;
}

function section(layout, sectionIdx) {
  for (const item of layout) panel(item.type, item.img || null, item.type === 'small' ? sectionIdx : undefined);
  cursor -= SEC_GAP;
}

// panel hover 
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();
let hoveredMesh = null;

function updatePointer(clientX, clientY) {
  pointer.x =  (clientX / window.innerWidth)  * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
}

function getHit(px, py) {
  raycaster.setFromCamera({ x: px, y: py }, camera);
  const hits = raycaster.intersectObjects(panelMeshes);
  return hits.length > 0 ? hits[0].object : null;
}


let currentIdx = 0;
const lightbox     = document.getElementById('lightbox');
const lbImg        = document.getElementById('lightbox-img');
const lbCounter    = document.getElementById('lightbox-counter');
const lbClose      = document.getElementById('lightbox-close');
const lbPrev       = document.getElementById('lb-prev');
const lbNext       = document.getElementById('lb-next');

function openLightbox(idx) {
  currentIdx = idx;
  const url = panelImages[idx];
  if (!url) return;
  lbImg.src = url;
  lbCounter.textContent = lang[currentLang].counter(idx + 1, panelImages.length);

  //  text panel if this is a desc panel and lang is not FR
  const sectionIdx = descPanelMap[idx];
  const lbText = document.getElementById('lightbox-text');
  if (sectionIdx !== undefined && currentLang !== 'fr') {
    const data = sectionContent[currentLang][sectionIdx];
    document.getElementById('lb-title').textContent = data.title;
    document.getElementById('lb-date').textContent  = data.date;
    const bodyEl = document.getElementById('lb-body');
    bodyEl.innerHTML = data.body.map(p => `<p>${p}</p>`).join('');
    const legendEl = document.getElementById('lb-legend');
    legendEl.innerHTML = data.legend
      ? data.legend.split('\n\n').map(l => `<p>${l}</p>`).join('')
      : '';
    // narrow image in split mode
    document.getElementById('lightbox-img').style.maxWidth = '55vw';
    lbText.classList.add('visible');
  } else {
    document.getElementById('lightbox-img').style.maxWidth = '';
    lbText.classList.remove('visible');
  }

  lightbox.classList.add('open');
}
function closeLightbox() {
  lightbox.classList.remove('open');
  lbImg.src = '';
}
function showAdj(dir) {
  let next = currentIdx + dir;
  // skip panels with no image
  while (next >= 0 && next < panelImages.length && !panelImages[next]) next += dir;
  if (next >= 0 && next < panelImages.length) openLightbox(next);
}

lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', e => { e.stopPropagation(); showAdj(-1); });
lbNext.addEventListener('click', e => { e.stopPropagation(); showAdj(1); });
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowRight')  showAdj(1);
  if (e.key === 'ArrowLeft')   showAdj(-1);
});

// camera
const keys = {};
let yaw = 0, pitch = 0;
let isDragging = false, lastX = 0, lastY = 0;
let mouseDownX = 0, mouseDownY = 0;
let sceneActive = false;
// sync with pre-module flag (set when overlay is dismissed)
setInterval(() => { if (window._vrSceneActive && !sceneActive) sceneActive = true; }, 100);
const MIN_Z = -(CORRIDOR_LENGTH - 0.5), MAX_Z = -0.3;
const MOUSE_SENS = 0.0025, TOUCH_SENS = 0.004;
let camX = 0, camY = 1.65, camZ = -0.3;

document.addEventListener('keydown', e => {
  if (lightbox.classList.contains('open')) return;
  keys[e.code] = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

renderer.domElement.addEventListener('mousedown', e => {
  if (lightbox.classList.contains('open')) return;
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  mouseDownX = e.clientX; mouseDownY = e.clientY;
});
window.addEventListener('mouseup', e => {
  isDragging = false;
  if (!sceneActive) return;
  if (lightbox.classList.contains('open')) return;
  // only treat as click if mouse barely moved
  if (Math.abs(e.clientX - mouseDownX) < 5 && Math.abs(e.clientY - mouseDownY) < 5) {
    updatePointer(e.clientX, e.clientY);
    const hit = getHit(pointer.x, pointer.y);
    if (hit) openLightbox(hit.userData.panelIdx);
  }
});
window.addEventListener('mousemove', e => {
  if (!sceneActive) return;
  updatePointer(e.clientX, e.clientY);
  if (isDragging) {
    yaw   -= (e.clientX - lastX) * MOUSE_SENS;
    pitch -= (e.clientY - lastY) * MOUSE_SENS;
    pitch = Math.max(-Math.PI*0.4, Math.min(Math.PI*0.4, pitch));
    lastX = e.clientX; lastY = e.clientY;
  }
});

renderer.domElement.addEventListener('dblclick', () => renderer.domElement.requestPointerLock?.());
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) isDragging = false;
});
document.addEventListener('pointermove', e => {
  if (document.pointerLockElement !== renderer.domElement) return;
  yaw   -= e.movementX * MOUSE_SENS;
  pitch -= e.movementY * MOUSE_SENS;
  pitch = Math.max(-Math.PI*0.4, Math.min(Math.PI*0.4, pitch));
});

let touches = {};
renderer.domElement.addEventListener('touchstart', e => {
  [...e.changedTouches].forEach(t => { touches[t.identifier] = {x: t.clientX, y: t.clientY, moved: false}; });
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const prev = touches[t.identifier];
    if (!prev) return;
    yaw   -= (t.clientX - prev.x) * TOUCH_SENS;
    pitch -= (t.clientY - prev.y) * TOUCH_SENS;
    pitch = Math.max(-Math.PI*0.4, Math.min(Math.PI*0.4, pitch));
    if (Math.abs(t.clientX - prev.x) > 5 || Math.abs(t.clientY - prev.y) > 5) prev.moved = true;
    touches[t.identifier] = {...prev, x: t.clientX, y: t.clientY};
  });
}, { passive: false });
renderer.domElement.addEventListener('touchend', e => {
  [...e.changedTouches].forEach(t => {
    const prev = touches[t.identifier];
    if (prev && !prev.moved && sceneActive && !lightbox.classList.contains('open')) {
      updatePointer(t.clientX, t.clientY);
      const hit = getHit(pointer.x, pointer.y);
      if (hit) openLightbox(hit.userData.panelIdx);
    }
    delete touches[t.identifier];
  });
});

    let vrSession = null;
    btn.addEventListener('click', async () => {
      if (!vrSession) {
        vrSession = await navigator.xr.requestSession('immersive-vr', { requiredFeatures: ['local-floor'] });
        renderer.xr.setSession(vrSession);
        btn.textContent = 'Quitter VR';
        vrSession.addEventListener('end', () => { vrSession = null; btn.textContent = 'Entrer en VR'; });
      } else { vrSession.end(); }
    });
  });
}

  const t = lang[currentLang];
  document.getElementById('overlay-sub').textContent = t.sub;
  document.getElementById('enter-btn').textContent   = t.enter;
  document.getElementById('controls-hint').textContent = t.controls;
  document.getElementById('click-hint').textContent  = t.hint;
  document.querySelector('.t-close').textContent     = t.close;
  document.querySelector('.t-prev').textContent      = t.prev;
  document.querySelector('.t-next').textContent      = t.next;
  const vrBtn = document.getElementById('vr-btn');
  if (vrBtn) vrBtn.textContent = t.vr;
  // update counter if lightbox open
  if (lightbox.classList.contains('open')) {
    lbCounter.textContent = t.counter(currentIdx + 1, panelImages.length);
  }
}

window._vrApplyLangFull = applyLang;
applyLang(currentLang);

// resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// touch walk buttons
const touchFwd  = document.getElementById('touch-fwd');
const touchBack = document.getElementById('touch-back');
const isMobile = () => window.innerWidth <= 768;

function bindTouchWalk(el, keyCode) {
  el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); keys[keyCode] = true; }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); e.stopPropagation(); keys[keyCode] = false; }, { passive: false });
  el.addEventListener('touchcancel',e => { keys[keyCode] = false; });
}
bindTouchWalk(touchFwd,  'KeyW');
bindTouchWalk(touchBack, 'KeyS');

// show touch controls only on mobile
function updateTouchControlsVisibility() {
  document.getElementById('touch-controls').style.display =
    isMobile() ? 'flex' : 'none';
}
updateTouchControlsVisibility();
window.addEventListener('resize', updateTouchControlsVisibility);

// animate
const MOVE_SPEED = 0.04;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const clickHint = document.getElementById('click-hint');

renderer.setAnimationLoop(() => {
  if (!renderer.xr.isPresenting) {
    if (keys['KeyW'] || keys['KeyZ'] || keys['ArrowUp'])
      camZ += new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0)).z * MOVE_SPEED;
    if (keys['KeyS'] || keys['ArrowDown'])
      camZ -= new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0)).z * MOVE_SPEED;
    camZ = Math.max(MIN_Z, Math.min(MAX_Z, camZ));

    camera.position.set(camX, camY, camZ);
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    // hover effect via emissive
    if (sceneActive && !lightbox.classList.contains('open')) {
      const hit = getHit(pointer.x, pointer.y);
      if (hit !== hoveredMesh) {
        if (hoveredMesh) hoveredMesh.material.emissive.set(0x000000);
        hoveredMesh = hit;
        if (hoveredMesh) {
          hoveredMesh.material.emissive.set(0x333028);
          document.body.style.cursor = 'pointer';
          clickHint.classList.add('visible');
        } else {
          document.body.style.cursor = '';
          clickHint.classList.remove('visible');
        }
      }
    }
  }
  renderer.render(scene, camera);
});
</script>
