    <style>
        .gallery-section {
            margin-bottom: 64px;
        }

        .section-desc {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            text-align: justify;
            margin: 8px 0 32px 0;
        }
        .section-label {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #999;
            border-top: 2px solid #000;
            padding-top: 14px;
            margin-bottom: 20px;
        }

        /* ── Grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
            background: #111;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s ease, filter 0.2s ease;
            will-change: transform;
            filter: grayscale(20%);
        }

        .grid-item:hover img {
            transform: scale(1.04);
            filter: grayscale(0%);
        }

        /* Hover overlay */
        .hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: flex-end;
            padding: 14px;
            transition: background 0.2s ease;
        }

        .grid-item:hover .hover-overlay {
            background: rgba(0,0,0,0.55);
        }

        .hover-caption {
            font-size: 11px;
            color: #fff;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .grid-item:hover .hover-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.open { display: flex; }

        .modal-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .modal-img-wrap {
            position: relative;
            max-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #expandedImg {
            max-height: 75vh;
            max-width: calc(100vw - 160px);
            object-fit: contain;
            display: block;
        }

        .modal-prev, .modal-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 22px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            z-index: 10;
        }

        .modal-prev { left: 16px; }
        .modal-next { right: 16px; }
        .modal-prev:hover, .modal-next:hover { background: rgba(255,255,255,0.25); }

        .modal-meta {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            width: 100%;
            max-width: calc(100vw - 160px);
        }

        .modal-caption {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            flex: 1;
        }

        .modal-counter {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #555;
            white-space: nowrap;
            padding-top: 2px;
        }

        /* Close button */
        .modal-close {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 28px;
            color: #fff;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            background: none;
            border: none;
            line-height: 1;
        }
        .modal-close:hover { opacity: 1; }
    </style>
</head>

    });

    const root = document.getElementById('gallery-root');
    sectionOrder.forEach(sec => {
        const wrap = document.createElement('div');
        wrap.className = 'gallery-section';
        const idMap = {
            '3–16 MAY': 'section-3-16',
            '18–19 MAY': 'section-18-19',
            '20–21 MAY': 'section-20-21',
            '22–26 MAY': 'section-22-26',
            '27 MAY': 'section-27',
            'MOURNING': 'section-mourning',
            'PHOTOGRAPHERS': 'section-photographers'
        };
        if (idMap[sec]) wrap.id = idMap[sec];

        const descMap = {
            '3–16 MAY': 'Following the assassination of President Park Chung-hee in October 1979, South Korea entered a period of political uncertainty. Student protests calling for democracy spread across the country, particularly at universities in Gwangju.',
            '18–19 MAY': 'On May 18, paratroopers were deployed to suppress demonstrations at Chonnam National University. Their violent response — beating students and bystanders indiscriminately — provoked outrage and drew tens of thousands of citizens into the streets.',
            '20–21 MAY': 'The uprising intensified as citizens armed themselves and seized control of the city. On May 21, soldiers opened fire on the crowd in front of the Provincial Government Office, killing dozens and marking a turning point in the confrontation.',
            '22–26 MAY': 'After the military withdrew from central Gwangju, citizens organised a self-governing committee to maintain order, distribute food, and negotiate with the authorities. The city held together under the shadow of an imminent crackdown.',
            '27 MAY': 'In the early hours of May 27, tens of thousands of martial law troops retook the city. The final defenders barricaded inside the Provincial Government Office were killed or arrested. The uprising was suppressed.',
            'MOURNING': 'In the weeks and months that followed, the victims were mourned in private while the government suppressed all public memory of the events. Families sought the bodies of the disappeared, and survivors faced imprisonment and torture.',
            'PHOTOGRAPHERS': 'The photographs collected here were taken by Korean journalists, foreign correspondents, and amateur photographers at great personal risk. Many images were confiscated or hidden for years before entering the public record.'
        };

        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = sec;
        wrap.appendChild(label);

        if (descMap[sec]) {
            const desc = document.createElement('p');
            desc.className = 'section-desc';
            desc.textContent = descMap[sec];
            wrap.appendChild(desc);
        }

        const grid = document.createElement('div');
        grid.className = 'photo-grid';

        sectionMap[sec].forEach(p => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = `
                <img src="${p.img}" alt="${p.desc.substring(0,60)}" loading="lazy">
                <div class="hover-overlay">
                    <span class="hover-caption">${p.desc}</span>
                </div>`;
            item.addEventListener('click', () => openModal(p.globalIndex));
            grid.appendChild(item);
        });

        wrap.appendChild(grid);
        root.appendChild(wrap);
    });

    let currentIndex = 0;

    function openModal(index) {
        currentIndex = index;
        updateModal();
        document.getElementById('photoModal').classList.add('open');
        document.addEventListener('keydown', handleKey);
    }

    function closeModal() {
        document.getElementById('photoModal').classList.remove('open');
        document.removeEventListener('keydown', handleKey);
    }

    function navigate(dir) {
        currentIndex = (currentIndex + dir + PHOTOS.length) % PHOTOS.length;
        updateModal();
    }

    function updateModal() {
        const p = PHOTOS[currentIndex];
        document.getElementById('expandedImg').src = p.img;
        document.getElementById('modal-description').textContent = p.desc;
        document.getElementById('modal-counter').textContent =
            `${currentIndex + 1} / ${PHOTOS.length}`;
    }

    function handleKey(e) {
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'Escape') closeModal();
    }

    document.getElementById('photoModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    window.addEventListener('load', () => {
        if (location.hash && location.hash.startsWith('#photo-')) {
            const photoName = location.hash.replace('#photo-', '') + '.jpg';
            const idx = PHOTOS.findIndex(p => p.img === photoName);
            if (idx !== -1) openModal(idx);
        }
    });
    </script>
</body>
</html>
