(function(){
  var STORAGE_KEY='gwangju_lang';
  var DEFAULT_LANG='en';
  var T={"en": {"nav_home": "HOME", "nav_exposition": "EXPOSITION", "nav_gallery": "PHOTO GALLERY", "nav_history": "HISTORY", "nav_documentaries": "DOCUMENTARIES", "nav_contact": "CONTACT US", "lang_html": "en", "index_title": "GWANGJU 5.18", "index_subtitle": "Urban Identity and Fight for Democracy", "index_intro": "A date attached to the name of the former capital of South Jeolla Province; a searing term for all South Korean democrats. The events documented in the photographs gathered here concern only a few days, from 18 to 27 May 1980. Yet their importance is inversely proportional to their duration, for the Gwangju Uprising occupies a central place in the process of democratization in South Korea.", "block1_date": "3-16<br>MAY", "block1_text": "The assassination of General Park on October 26, 1979 sparked widespread protests among the Korean people, who had endured many years of dictatorship. Their main demands included autonomy for universities, the lifting of martial law, and guarantees of fundamental workers' rights...", "block1_readmore": "READ MORE", "block2_date": "18-19<br>MAY", "block2_text": "During the night of May 17, the military junta announced \"the extension of the state of emergency to the entire country\" and the closure of all universities, with 24 opposition politicians and numerous figures involved in the fight for democracy being arrested. More than 25,000...", "block2_readmore": "READ MORE", "block3_date": "20-21<br>MAY", "block3_text": "On May 20, as the movement's support base expanded considerably, winning over large sections of the population of Gwangju, the demonstration turned into a widespread uprising. At around 7 p.m., a procession consisting of a truck, 11 buses, and approximately 200 taxis...", "block3_readmore": "READ MORE", "block4_date": "22-26<br>MAY", "block4_text": "After the withdrawal of troops, the main roads leading to other regions were blocked and communications were suspended, cutting Gwangju off from the rest of the world. However, the city did not collapse and managed to maintain order and organize itself. Every day, tens of thousands of...", "block4_readmore": "READ MORE", "block5_date": "27<br>MAY", "block5_text": "The military regime prepares its final suppression operation by deploying the 11th Airborne Brigade and the 20th Division, after obtaining approval from the United States. On May 26, the military calls on the citizen militias to surrender. However, many residents remain determined to defend the Provincial Office, pledging to resist until the very end. Facing a heavily armed army...", "block5_readmore": "READ MORE", "block6_date": "1980-<br>NOW", "block6_text": "In Gwangju, the memory of the events of May 1980 remains an open wound, kept alive through ongoing efforts to commemorate the victims of a brutal repression. This memory has become a fundamental part of the city's identity. The remembrance of the...", "block6_readmore": "READ MORE", "footer_title": "CONTACT US", "footer_desc": "For questions, partnerships, or information about the project and the archives.", "footer_name": "NAME", "footer_email": "EMAIL", "footer_message": "MESSAGE", "footer_send": "SEND", "history_title": "THE HISTORY<br>OF GWANGJU", "history_map": "MAP OF EVENTS", "s1_title": "Protests (May 3-16)", "s1_sub": "Coup d'état and aspirations for democracy", "s1_p1": "The assassination of General Park on October 26, 1979 sparked widespread protests among the Korean people, who had endured many years of dictatorship. Their main demands included autonomy for universities, the lifting of martial law, and guarantees of fundamental workers' rights.", "s1_p2": "But this \"springtime of democracy\" was cut short on December 12, 1979, by another coup d'état that brought General Chun Doo-hwan to power. From then on, demands became more insistent and protests gained new momentum.", "s1_p3": "On May 10, representatives of student unions from across the country called for the lifting of martial law and the resignation of Chun Doo-hwan. A few days later, on May 15, several hundred thousand people took part in a large demonstration in Seoul, but faced with the high risk of military intervention and low citizen participation, the movement lost momentum.", "s1_p4": "However, this is not the case in Gwangju. The birthplace of protests against central government since the revolt of the Donghak (1894-1895), the city of opposition leader Kim Dae-jung embodies protest more than ever.", "s1_p5": "There, Chonnam National University and Chosun National University found themselves at the forefront of the protests. From May 8 to 16, they organized a \"rally for democratization\" that drew participants from far beyond the student body.", "s1_p6": "On May 16, tens of thousands of people gathered peacefully in front of the provincial government headquarters, demanding the lifting of the state of emergency and the departure of the military. Students in Gwangju then decided to meet on May 19 in front of the main entrance of Chonnam National University.", "s1_p7": "However, at midnight on May 17, the military junta extended the state of emergency to the entire country and proceeded with the mass arrest of political figures, opponents, and student leaders.", "s1_p8": "This decision, which had serious consequences, sparked the uprising of May 18.", "s2_title": "Repression (May 18-19)", "s2_sub": "From repression to confrontation", "s2_p1": "During the night of May 17, the military junta announced \"the extension of the state of emergency to the entire country\" and the closure of all universities. Twenty-four opposition politicians and numerous figures involved in the fight for democracy were arrested.", "s2_p2": "More than 25,000 soldiers, mainly from the airborne brigades, the 20th Division, and the Marines, were deployed to 136 locations across the country, including 31 universities and television stations, to carry out a large-scale operation to arrest student leaders. On May 18 alone, 549 people were arrested, including 227 students.", "s2_p3": "On May 18, students in Gwangju organized a demonstration demanding the withdrawal of the airborne brigades. At around 2:30 a.m., troops from the 7th Airborne Brigade and the 31st Division were deployed to Chonnam National University, Chosun University, and eight other technical colleges. The first clashes took place in the morning in front of the main entrance to Chonnam National University. The students, chased by soldiers armed with rifles and batons, took refuge in the city center and continued their demonstration. The police then called in riot police.", "s2_p4": "In the afternoon, airborne forces entered the streets of Geumnam-ro and Chungjang-ro, indiscriminately striking and arresting passersby. In a single day, more than 400 citizens were arrested and many were injured. The streets of Gwangju were plunged into chaos.", "s2_p5": "On May 19, driven by anger, citizens gathered again in the city center, while the military used tear gas, indiscriminately arrested young people, beat them, and then loaded them, sometimes naked, into military trucks. For their part, residents continued to resist by erecting barricades using stones, flower pots, sidewalk slabs, and metal barriers. They stood together and sang the national anthem, the \"Song of Justice,\" and \"Our Wish is Reunification,\" while continuing to fight.", "s2_p6": "The confrontation fuels anger, while fear turns into resistance. The clashes become increasingly violent.", "s3_title": "Uprising (May 20-21)", "s3_sub": "From oppression to insurrection", "s3_p1": "On May 20, as the movement's support base expanded considerably, winning over large sections of the population of Gwangju, the demonstration turned into a widespread uprising. At around 7 p.m., a procession consisting of a truck, 11 buses, and approximately 200 taxis completely filled Geumnam-ro. With their headlights on and horns blaring, they headed toward the provincial government building. This show of force gave the protesters new energy and marked a real turning point in the uprising.", "s3_p2": "In response to the media blackout, protesters stormed the MBC and KBS stations and set them on fire. In the evening, violent clashes broke out at Gwangju train station, a strategic point for the transport of military equipment. This is where the first shooting took place: seven civilians were killed, many people were injured, and a soldier died after being hit by a vehicle driven by protesters.", "s3_p3": "At dawn on May 21, two protesters killed during the previous day's clashes were transported on a cart, covered with the national flag, and brought to Geumnam-ro. The presence of the bodies galvanized the crowd. The street filled with protesters, and the uprising reached its peak. The army general staff then triggered the highest alert level, known as \"Jindotgae n.1.\"", "s3_p4": "At around 1 p.m., as loudspeakers blared the national anthem from the provincial government building, the 11th Airborne Brigade opened fire on the demonstrators. In response, the population armed themselves by recovering rifles from civil defense depots in Naju and Hwa-sun, near Gwangju, and prepared to fight back. On May 21 alone, 45 civilians were killed and hundreds more wounded.", "s3_p5": "Faced with fierce resistance from citizens, martial law troops withdrew from the city center on the afternoon of May 21. They then blocked access to Gwangju, isolating the city from the outside world.", "s4_title": "Resistance (May 22-26)", "s4_sub": "Military blockade, armed struggle, and citizen solidarity", "s4_p1": "After the withdrawal of troops, the main roads leading to other regions were blocked and communications suspended, cutting Gwangju off from the rest of the world. However, the city did not collapse and managed to maintain order and organize itself.", "s4_p2": "Every day, tens of thousands of citizens gathered in front of the provincial government headquarters to hold rallies in defense of democracy. Citizens participated in blood drives, and shopkeepers and women distributed meals to passersby. Gwangju became a city free of theft and crime, demonstrating the potential of a new, united community.", "s4_p3": "Under the strict control of the new military regime, the national media labelled the citizens as \"rioters.\" But, despite the danger, foreign journalists entered Gwangju and reported that, despite impressive sacrifices, the inhabitants were maintaining order while demanding democracy.", "s4_p4": "The riots predicted by the regime did not occur. Gwangju realized, even temporarily, the dream of Daedong Sesang: a society based on autonomy and solidarity. However, this calm was short-lived. As the truth about the massacre spread and sympathy for the uprising grew, the new military regime moved toward a radical decision: sending a massive military force to Gwangju.", "s5_title": "Suppression (May 27)", "s5_sub": "The Final Battle and the Legacy of May 18", "s5_p1": "The military regime prepared its final suppression operation by deploying the 11th Airborne Brigade and the 20th Division, after obtaining approval from the United States. On May 26, the military called on the citizen militias to surrender. However, many residents remained determined to defend the Provincial Office, pledging to resist until the very end.", "s5_p2": "On the morning of May 27, the military launched its operation to retake control. Seventeen militia members were killed and around 300 were disarmed. After ten days of uprising, 166 people had lost their lives, and approximately 5,000 others had been wounded or arrested.", "s5_p3": "The echoes of May 18 reappeared in the June Democratic Movement of 1987. In 1995, the Special Act on the May 18 Democratic Movement allowed former presidents Chun Doo-hwan and Roh Tae-woo to be brought to justice. In 2011, testimonies, judicial records, photographs, videos, newspapers, reporters' notebooks, and hospital archives related to May 18 were inscribed on UNESCO's Memory of the World Register.", "s5_p4": "Though brutally suppressed, the citizens' struggle for democracy in Gwangju remains alive, continuing to sustain the process of democratization in South Korea and leaving a lasting mark on similar movements across Asia.", "s6_title": "Mourning", "s6_sub": "Memory and Urban Identity", "s6_p1": "In Gwangju, the memory of the events of May 1980 remains an open wound, kept alive through ongoing efforts to commemorate the victims of a brutal repression. This memory has become a fundamental part of the city's identity.", "s6_p2": "The Jeonil Building, overlooking May 18 Square, still bears the marks of machine-gun fire from army helicopters that targeted demonstrators. Several floors have since been transformed into a museum. Similarly, the clock on May 18 Square plays March for the Beloved every day at 5:18 p.m., composed in tribute to a young couple who were victims of the repression.", "s6_p3": "Visitors to Gwangju can follow a memorial route from Geumnam Avenue to the Mangwol-dong Cemetery, passing by the former Sangmu military prison, now a museum within the \"Freedom Park.\"", "s6_p4": "More recently, many residents of Gwangju mobilized in response to President Yoon Suk-yeol's attempt to impose martial law on December 3, 2024. Among the crowds gathered in Democracy Square, many survivors of the 1980 repression stood in the front rows, determined that the sacrifice of their comrades would not be in vain.", "s7_title": "Photographing", "s7_sub": "Between Historical Testimony and Evidentiary Use", "s7_p1": "The events in Gwangju were first documented by Korean press photographers, among whom Na Kyung-taek and Lee Chang-sung stand out. Sent to the scene by their respective newspapers (Gwangju Ilbo and JoongAng Ilbo), they recorded the earliest moments of the uprising.", "s7_p2": "They were later joined by photographers working for newspapers based in Seoul, followed by foreign journalists. Among them was Philippe Pons, Tokyo correspondent for Le Monde, who arrived in Seoul on May 20 and, starting on May 22, published a series of daily reports from Gwangju.", "s7_p3": "Several international photographers were also present, including Robin Moyer for The Times, Norman Thorpe for The Wall Street Journal, and the French photographers Patrick Chauvel and François Lochon. Both were members of major photo agencies — Sygma for Chauvel and Gamma for Lochon. They worked alongside cameraman Jürgen Hinzpeter, correspondent for the German broadcaster ARD, who arrived in Gwangju on the morning of May 20.", "s7_p4": "In addition to the professional photographers, there were also more modest contributions from amateurs, such as Pastor Huntley, who documented the influx of wounded victims from within the emergency room of the Gwangju Christian Hospital.", "s7_p5": "Although these visual records were subject to state censorship until the late 1980s, they were later mobilized for their evidentiary value. Today, they must be considered as historical objects in their own right, examining not only the images themselves, but also the conditions of their production, their circulation, and their various uses over time.", "gallery_title": "PHOTO GALLERY", "gallery_filter_all": "ALL", "doc_title": "DOCUMENTARIES", "doc_about_title": "ABOUT THE PROJECT", "doc_about": "Since 2013, students from the Master 2 Cultures et Métiers du Web at Université Gustave Eiffel (France) and the Film & Visual Media Technology Department at Dong-Eui University in Busan (South Korea) have collaborated each year on interactive documentaries, tracing the traces of Korean history — from the streets of Busan and Seoul to the memory of May 1980 in Gwangju. A partnership that led to a double-degree programme between the two universities in 2019.", "doc_synopsis_2024": "In a world where truth is subject to individual sensitivities and images carry the power of conviction, how can archival footage build a narrative of the birth of South Korean democracy?", "doc_synopsis_2023": "The history of the Gwangju Uprising is written through the memories of its survivors. Each fought in their own way. This documentary follows artists — singers, painters, writers — who carry their shared trauma through their work.", "doc_synopsis_2021": "Forty years after the events in Gwangju, a super-16mm film enriches the visual archive of the May 18 insurrection. What remains of this film, its author, its journey, its intentions, its emotions?", "doc_synopsis_2020": "In 1980, the students and citizens of Gwangju rose up for democracy and freedom. Brutally suppressed, the uprising left many dead and wounded. How has it been commemorated in the decades since? What place does it hold in Korean memory and society?", "doc_synopsis_2019": "After watching A Taxi Driver in a Parisian cinema, a group of friends decides to investigate the events surrounding the Gwangju Uprising of May 18, 1980. Their research leads them to the city itself, where a Chonnam University student guides them through the sites of memory.", "doc_synopsis_2018": "In 1980, the closure of Chonnam University in Gwangju provoked a student uprising massively repressed in bloodshed. Today regarded as the emblem of South Korea's democratic aspirations, this documentary traces the genealogy of the photographs that shaped our knowledge of the event.", "expo_title": "EXPOSITION", "page_title_gallery": "PHOTO GALLERY", "gallery_sec_316": "Following the assassination of President Park Chung-hee in October 1979, South Korea entered a period of political uncertainty. Student protests calling for democracy spread across the country, particularly at universities in Gwangju.", "gallery_sec_1819": "On May 18, paratroopers were deployed to suppress demonstrations at Chonnam National University. Their violent response — beating students and bystanders indiscriminately — provoked outrage and drew tens of thousands of citizens into the streets.", "gallery_sec_2021": "The uprising intensified as citizens armed themselves and seized control of the city. On May 21, soldiers opened fire on the crowd in front of the Provincial Government Office, killing dozens and marking a turning point in the confrontation.", "gallery_sec_2226": "After the military withdrew from central Gwangju, citizens organised a self-governing committee to maintain order, distribute food, and negotiate with the authorities. The city held together under the shadow of an imminent crackdown.", "gallery_sec_27": "In the early hours of May 27, tens of thousands of martial law troops retook the city. The final defenders barricaded inside the Provincial Government Office were killed or arrested. The uprising was suppressed.", "gallery_sec_mourning": "In the weeks and months that followed, the victims were mourned in private while the government suppressed all public memory of the events. Families sought the bodies of the disappeared, and survivors faced imprisonment and torture.", "gallery_sec_photographers": "The photographs collected here were taken by Korean journalists, foreign correspondents, and amateur photographers at great personal risk. Many images were confiscated or hidden for years before entering the public record.", "gallery_label_316": "3–16 MAY", "gallery_label_1819": "18–19 MAY", "gallery_label_2021": "20–21 MAY", "gallery_label_2226": "22–26 MAY", "gallery_label_27": "27 MAY", "gallery_label_mourning": "MOURNING", "gallery_label_photographers": "PHOTOGRAPHERS", "s2_quote_intro": "On May 20, journalists from Jeonnam Maeil (now Gwangju Ilbo) submitted their collective resignation. The letter is concise, but it perfectly reflects the journalists' sense of dismay and revolt:", "s2_quote": "“We saw it. We saw with our own eyes people being dragged away like dogs and dying. But we couldn't write a single line in the newspaper. That is why we are putting down our pens in shame.”", "s3_p6": "Faced with fierce resistance from citizens, martial law troops withdrew from the city center on the afternoon of May 21. They then blocked access to Gwangju, isolating the city from the outside world.", "s4_p4b": "The riots predicted by the regime do not occur. Gwangju realizes, even temporarily, the dream of Daedong Sesang: a society based on autonomy and solidarity.", "s4_p4c": "However, this calm is short-lived. As the truth about the massacre spreads and sympathy for the uprising grows, the new military regime moves toward a radical decision: sending a massive military force to Gwangju. The prospect of bloody repression becomes increasingly palpable.", "s5_p2b": "In 1995, the Special Act on the May 18 Democratic Movement allows former presidents Chun Doo-hwan and Roh Tae-woo to be brought to justice.", "s5_p2c": "In 2011, testimonies, judicial records, photographs, videos, newspapers, reporters' notebooks, and hospital archives related to the events of May 18 are inscribed on UNESCO's Memory of the World Register.", "s5_p2d": "Though brutally suppressed, the citizens' struggle for democracy in Gwangju remains alive. It continues to sustain the process of democratization in South Korea and has left a lasting mark on similar movements across Asia.", "s6_p2b": "It is also common for May 18 Square — formerly the Provincial Government Square — to be transformed into an open-air exhibition space. Large reproductions of photographs documenting the uprising and its repression are displayed there, allowing visitors to engage directly with the city's photographic archives and contributing to the construction of Gwangju's urban identity.", "s6_p4b": "More recently, many residents of Gwangju mobilized once again in response to President Yoon Suk-yeol's attempt to impose martial law on December 3, 2024. On December 4, among the crowds gathered in Democracy Square, many survivors of the 1980 repression stood in the front rows determined that the sacrifice of their comrades would not be in vain.", "s7_p1b": "The events in Gwangju were first documented by Korean press photographers, among whom Na Kyung-taek and Lee Chang-sung stand out. Sent to the scene by their respective newspapers (Gwangju Ilbo and JoongAng Ilbo), they recorded the earliest moments of the uprising.", "s7_p2b": "They were later joined by photographers working for newspapers based in Seoul, followed by foreign journalists. Among them was Philippe Pons, Tokyo correspondent for Le Monde, who arrived in Seoul on May 20 and, starting on May 22, published a series of daily reports from Gwangju.", "s7_p3b": "Several international photographers were also present, including Robin Moyer for The Times, Norman Thorpe for The Wall Street Journal, and the French photographers Patrick Chauvel and François Lochon. Both were members of major photo agencies — Sygma for Chauvel and Gamma for Lochon. They worked alongside television reporters, including cameraman Jürgen Hinzpeter, correspondent for the German broadcaster ARD, who arrived in Gwangju on the morning of May 20.", "s7_p4b": "In addition to the extensive work produced by these professional photographers, many of whom were experienced in covering war zones, there were also more modest contributions from amateur photographers. These individuals sought to leave a visual record of the hardships they were witnessing. One such example is Pastor Huntley, who documented the influx of wounded victims and the acts of solidarity surrounding them from within the emergency room of the Gwangju Christian Hospital.", "s7_p5b": "These images reveal not only the challenges faced by photographers but also the relative freedom with which many were able to operate. They can be seen working at times among the military, and at other times in the midst of the demonstrators — contradicting the widespread assumption that these photographs were always captured clandestinely under the constant threat of military repression.", "s7_p6b": "Although these visual records were subject to state censorship until the late 1980s, they were later mobilized for their evidentiary value, helping to establish the reality of the repression. Today, they must also be considered as historical objects in their own right — as part of a photographic history that examines not only the images themselves, but also the conditions of their production, their circulation, and their various uses over time.", "expo_intro": "Explore the visual archives of the Gwangju 5.18 Exposition."}, "fr": {"nav_home": "ACCUEIL", "nav_exposition": "EXPOSITION", "nav_gallery": "GALERIE DE PHOTOS", "nav_history": "HISTOIRE", "nav_documentaries": "DOCUMENTAIRES", "nav_contact": "NOUS CONTACTER", "lang_html": "fr", "index_title": "GWANGJU 5.18", "index_subtitle": "Identité urbaine et combat démocratique", "index_intro": "Une date accolée au nom de l'ancienne capitale de la province du Jeolla du Sud ; un vocable incandescent pour tous les démocrates sud-coréens. Les événements que documentent les photographies rassemblées ici concernent quelques journées seulement : du 18 au 27 mai 1980. Mais leur importance est inversement proportionnelle à leur durée. Car le soulèvement de Gwangju occupe une place centrale dans le processus de démocratisation en Corée du Sud.", "block1_date": "3-16<br>MAI", "block1_text": "L'assassinat du général Park, survenu le 26 octobre 1979, est à l'origine d'un large mouvement de revendications au sein de la population coréenne, venant après de longues années de dictature. Au centre des doléances figurent alors l'autonomie des établissements universitaires, la levée de la loi martiale et la garantie des droits fondamentaux des travailleurs...", "block1_readmore": "LIRE LA SUITE", "block2_date": "18-19<br>MAI", "block2_text": "Dans la nuit du 17 mai, la junte militaire annonce « l'extension de l'état d'urgence à l'ensemble du pays » ainsi que la fermeture de toutes les universités. Vingt-quatre responsables politiques de l'opposition, ainsi que de nombreuses figures du combat démocratique sont arrêtés...", "block2_readmore": "LIRE LA SUITE", "block3_date": "20-21<br>MAI", "block3_text": "Le 20 mai, alors que l'assise du mouvement s'élargit considérablement, gagnant de larges pans de la population de Gwangju, la manifestation se transforme en un vaste soulèvement. Vers 19 heures, un cortège composé d'un camion, de 11 bus et d'environ 200 taxis...", "block3_readmore": "LIRE LA SUITE", "block4_date": "22-26<br>MAI", "block4_text": "Après le retrait des troupes, les principales routes menant vers d'autres régions sont bloquées et les communications suspendues, faisant de Gwangju une agglomération coupée du monde. Cependant, la ville ne s'effondre pas et parvient à maintenir l'ordre et s'organiser...", "block4_readmore": "LIRE LA SUITE", "block5_date": "27<br>MAI", "block5_text": "Le régime militaire prépare l'opération finale de répression en déployant la 11e brigade aéroportée et la 20e division, non sans avoir obtenu l'approbation des États-Unis. Le 26 mai, les militaires demandent aux miliciens de se rendre, mais de nombreux habitants défendent la préfecture...", "block5_readmore": "LIRE LA SUITE", "block6_date": "1980-<br>AUJOURD'HUI", "block6_text": "À Gwangju, le souvenir des journées de mai 1980 reste une blessure ouverte, maintenue à vif par le travail de mémoire consacré aux victimes d'une répression féroce. Il est constitutif de l'identité urbaine...", "block6_readmore": "LIRE LA SUITE", "footer_title": "NOUS CONTACTER", "footer_desc": "Pour toute question, partenariat ou information sur le projet et les archives.", "footer_name": "NOM", "footer_email": "E-MAIL", "footer_message": "MESSAGE", "footer_send": "ENVOYER", "history_title": "L'HISTOIRE<br>DE GWANGJU", "history_map": "CARTE DES ÉVÉNEMENTS", "s1_title": "Manifestations (3-16 mai)", "s1_sub": "Coup d'état et aspirations à la démocratie", "s1_p1": "L'assassinat du général Park, survenu le 26 octobre 1979, est à l'origine d'un large mouvement de revendications au sein de la population coréenne, venant après de longues années de dictature. Au centre des doléances figurent alors l'autonomie des établissements universitaires, la levée de la loi martiale et la garantie des droits fondamentaux des travailleurs.", "s1_p2": "Mais ce « printemps de la démocratie » se heurte, dès le 12 décembre 1979, à un nouveau coup d'État qui porte le général Chun Doo-hwan au pouvoir. Dès lors, les revendications se font plus insistantes et les mobilisations prennent un nouvel essor.", "s1_p3": "Le 10 mai, les représentants des syndicats étudiants de tout le pays demandent la levée de la loi martiale et la démission de Chun Doo-hwan. Quelques jours plus tard, le 15 mai, plusieurs centaines de milliers de personnes participent à une grande manifestation à Séoul, mais, confronté au risque élevé d'intervention militaire et à une faible participation citoyenne, le mouvement s'essouffle.", "s1_p4": "En revanche, il n'en est rien à Gwangju. Berceau de la contestation contre le pouvoir central depuis la révolte du Donghak (1894-1895), la ville de l'opposant Kim Dae-jung incarne plus que jamais la geste protestataire.", "s1_p5": "Là, les universités nationales de Chonnam et Chosun se retrouvent à la pointe de la contestation. Du 8 au 16 mai, elles sont à l'initiative d'un « rassemblement pour la démocratisation » qui déborde largement des seuls rangs étudiants.", "s1_p6": "Le 16 mai, des dizaines de milliers de personnes se rassemblent pacifiquement devant le siège du gouvernement provincial, réclamant la levée de l'état d'urgence et le départ des militaires. Les étudiants de Gwangju décident alors de se retrouver le 19 mai devant l'entrée principale de l'université nationale de Chonnam.", "s1_p7": "Cependant, le 17 mai à minuit, la junte militaire étend l'état d'urgence à l'ensemble du pays et procède à l'arrestation massive de personnalités politiques, d'opposants et de dirigeants étudiants.", "s1_p8": "Cette décision, lourde de conséquences, est à l'origine du soulèvement du 18 mai.", "s2_title": "Répression (18-19 mai)", "s2_sub": "De la répression à la confrontation", "s2_p1": "Dans la nuit du 17 mai, la junte militaire annonce « l'extension de l'état d'urgence à l'ensemble du pays » ainsi que la fermeture de toutes les universités. Vingt-quatre responsables politiques de l'opposition, ainsi que de nombreuses figures du combat démocratique sont arrêtés.", "s2_p2": "Plus de 25 000 soldats, issus notamment des brigades aéroportées, de la 20e division et des marines, sont déployés sur 136 sites à travers le pays, y compris 31 universités et des stations de télévision, afin de procéder à une vaste opération d'arrestation des dirigeants étudiants. Au cours de la seule journée du 18 mai, 549 personnes sont interpellées, dont 227 étudiants.", "s2_p3": "Le 18 mai, à Gwangju, des étudiants organisent une manifestation pour réclamer le départ des brigades aéroportées. Vers 2h30 du matin, les troupes de la 7e brigade aéroportée et de la 31e division sont déployées à l'université nationale de Chonnam, à l'université de Chosun et dans huit autres établissements d'enseignement technique. Les premiers heurts ont alors lieu dans la matinée, devant l'entrée principale de l'université nationale de Chonnam.", "s2_p4": "Dans l'après-midi, les forces aéroportées pénètrent dans les rues de Geumnam-ro et Chungjang-ro, frappant et arrêtant les passants sans distinction. En une seule journée, plus de 400 citoyens sont arrêtés tandis qu'on recense un grand nombre de blessés. Les rues de Gwangju sont alors plongées dans un véritable chaos.", "s2_p5": "Le 19 mai, mus par la colère, les citoyens se rassemblent de nouveau dans le centre-ville, tandis que les militaires font usage de grenades lacrymogènes, arrêtent les jeunes sans distinction, les frappent puis les embarquent, parfois déshabillés, dans des camions militaires. De leur côté, les habitants continuent de résister en érigeant des barricades.", "s2_p6": "La confrontation alimente alors la colère, tandis que la peur se transforme en résistance. Les affrontements deviennent de plus en plus violents.", "s3_title": "Soulèvement (20-21 mai)", "s3_sub": "De l'oppression à l'insurrection", "s3_p1": "Le 20 mai, alors que l'assise du mouvement s'élargit considérablement, gagnant de larges pans de la population de Gwangju, la manifestation se transforme en un vaste soulèvement. Vers 19 heures, un cortège composé d'un camion, de 11 bus et d'environ 200 taxis remplit entièrement Geumnam-ro. Phares allumés et klaxons retentissants, ils se dirigent vers le bâtiment du gouvernement provincial.", "s3_p2": "En réaction au silence imposé par les médias, des manifestants prennent d'assaut les stations MBC et KBS et y mettent le feu. Dans la soirée, de violents affrontements éclatent à la gare de Gwangju. C'est là qu'intervient la première fusillade : sept civils sont tués, un grand nombre de personnes blessées et un militaire meurt après avoir été percuté par un véhicule.", "s3_p3": "À l'aube du 21 mai, deux manifestants tués lors des affrontements de la veille sont transportés sur un chariot, recouvert du drapeau national, et amenés sur Geumnam-ro. La présence des corps galvanise la foule. L'État-major de l'armée déclenche alors le niveau d'alerte maximale, appelé « Jindotgae n.1 ».", "s3_p4": "Vers 13 heures, la 11e brigade aéroportée ouvre le feu sur les manifestants. En réponse, la population s'arme en récupérant des fusils dans les dépôts de la défense civile. Rien que ce 21 mai, 45 civils sont tués et des centaines d'autres blessés.", "s3_p5": "Face à une résistance citoyenne acharnée, les troupes de la loi martiale se retirent du centre-ville dans l'après-midi du 21 mai, bloquant ensuite les accès de Gwangju.", "s4_title": "Résistance (22-26 mai)", "s4_sub": "Blocus militaire, lutte armée et solidarité citoyenne", "s4_p1": "Après le retrait des troupes, les principales routes menant vers d'autres régions sont bloquées et les communications suspendues, faisant de Gwangju une agglomération coupée du monde. Cependant, la ville ne s'effondre pas et parvient à maintenir l'ordre et s'organiser.", "s4_p2": "Chaque jour, des dizaines de milliers de citoyens se rassemblent devant le siège du gouvernement provincial. Des citoyens participent à des collectes de sang, des commerçants et des femmes distribuent des repas aux passants. Gwangju devient une ville où le vol et la criminalité sont absents.", "s4_p3": "Sous le contrôle strict du nouveau régime militaire, les médias nationaux qualifient les citoyens d'« émeutiers ». Mais, au mépris du danger, des journalistes étrangers entrent à Gwangju et rapportent la réalité.", "s4_p4": "Les émeutes prévues par le régime ne se produisent pas. Gwangju réalise, même temporairement, le rêve du Daedong Sesang : une société fondée sur l'autonomie et la solidarité. Cependant, ce calme est de courte durée et la perspective d'une répression sanglante devient progressivement palpable.", "s5_title": "Écrasement (27 mai)", "s5_sub": "La bataille finale et l'héritage du 18 mai", "s5_p1": "Le régime militaire prépare l'opération finale de répression en déployant la 11e brigade aéroportée et la 20e division, non sans avoir obtenu l'approbation des États-Unis. Le 26 mai, les militaires demandent aux miliciens de se rendre, mais de nombreux habitants défendent la préfecture et s'engagent à lutter jusqu'au bout.", "s5_p2": "Dans la matinée du 27 mai, l'opération de reprise du contrôle par les militaires commence : 17 miliciens sont tués et environ 300 sont désarmés. Au terme des dix jours de soulèvement, 166 personnes sont mortes et environ 5 000 ont été blessées ou arrêtées.", "s5_p3": "Les échos du 18 mai se retrouvent dans le Mouvement de juin 1987. En 1995, la loi spéciale sur le Mouvement démocratique du 18 mai permet la traduction en justice des anciens présidents Chun Doo-hwan et Roh Tae-woo. Les témoignages et documents relatifs au 18 mai sont inscrits en 2011 au patrimoine mondial de l'UNESCO.", "s5_p4": "Réprimée dans le sang, la lutte des citoyens de Gwangju pour la démocratie n'en demeure pas moins vivante, contribuant à entretenir le processus de démocratisation en Corée du Sud.", "s6_title": "Deuil", "s6_sub": "Mémoire et identité urbaine", "s6_p1": "À Gwangju, le souvenir des journées de mai 1980 reste une blessure ouverte, maintenue à vif par le travail de mémoire consacré aux victimes d'une répression féroce. Il est constitutif de l'identité urbaine.", "s6_p2": "Le bâtiment Jeonil, qui donne sur la place du 18 mai, porte encore la trace des balles de mitrailleuse tirées par les hélicoptères de l'armée. Un musée y occupe plusieurs étages. De même, l'horloge de la place du 18 mai joue, chaque jour à 5 heures 18, la « marche des êtres chers ».", "s6_p3": "Le touriste en visite à Gwangju se voit proposer un circuit rassemblant les principaux sites liés au soulèvement, le conduisant de l'avenue Geumnam au cimetière de Mangwol-dong en passant par la prison militaire de Sangmu, devenue musée dans un « parc de la liberté ».", "s6_p4": "De nombreux habitants de Gwangju se sont encore mobilisés récemment, à l'occasion de la tentative du président Yoon Suk-yeol pour instaurer la loi martiale le 3 décembre 2024. Aux premiers rangs se tenaient nombre de survivants de la répression.", "s7_title": "Photographier", "s7_sub": "Entre témoignage historique et usage probatoire", "s7_p1": "Les événements de Gwangju ont d'abord été couverts par des photographes de presse coréens, aux premiers rangs desquels on trouve Na Kyung-taek et Lee Chang-Sung. Dépêchés sur les lieux par leurs journaux respectifs, ils documentent les premiers moments du soulèvement.", "s7_p2": "Ils sont rejoints dans un second temps par des photographes travaillant pour les journaux de Séoul, puis par des journalistes étrangers. C'est le cas de Philippe Pons, correspondant du journal Le Monde à Tokyo.", "s7_p3": "Des photographes étrangers sont aussi à pied d'œuvre : Robin Moyer pour le Times, Norman Thorpe pour le Wall Street Journal ainsi que les Français Patrick Chauvel et François Lochon, membres d'agences photographiques Sygma et Gamma. Ils côtoient le cameraman Jürgen Hinzpeter, correspondant de la chaîne ARD.", "s7_p4": "À la production de ces photographes professionnels s'ajoute celle d'amateurs, comme le pasteur Huntley, qui documente depuis la salle des urgences de l'hôpital chrétien de Gwangju l'afflux des blessés.", "s7_p5": "Confrontés à la censure d'État jusqu'à la fin des années 1980, ces témoignages ont ensuite été mobilisés pour leur valeur probatoire. Il s'agit maintenant de les considérer en tant qu'objet d'histoire, mettant en perspective les conditions de production de ces clichés, leur usage et leur circulation.", "gallery_title": "GALERIE DE PHOTOS", "gallery_filter_all": "TOUT", "doc_title": "DOCUMENTAIRES", "doc_about_title": "À PROPOS DU PROJET", "doc_about": "Depuis 2013, des étudiants du Master 2 Cultures et Métiers du Web de l'Université Gustave Eiffel (France) et du département Film & Visual Media Technology de l'Université Dong-Eui à Busan (Corée du Sud) collaborent chaque année sur des documentaires interactifs, retraçant les traces de l'histoire coréenne. Un partenariat qui a conduit à un double diplôme entre les deux universités en 2019.", "doc_synopsis_2024": "Dans un contexte où la vérité est sujette aux sensibilités individuelles et où l'image a un pouvoir de conviction, comment bâtir un récit de la genèse de la démocratie sud-coréenne à partir d'images d'archives ?", "doc_synopsis_2023": "L'histoire du soulèvement de Gwangju s'écrit grâce à la mémoire de ses survivants. Ce documentaire suit des artistes — chanteurs, peintres, écrivains — qui portent ce traumatisme partagé à travers leur œuvre.", "doc_synopsis_2021": "Quarante ans après les événements de Gwangju, un film super 16 mm enrichit le répertoire visuel de l'insurrection du 18 mai 1980. De ce film, de son auteur, de son parcours, que reste-t-il ?", "doc_synopsis_2020": "En 1980, les étudiants et les citoyens de Gwangju se révoltent pour la démocratie et pour la liberté. Sauvagement réprimé, ce soulèvement a provoqué de nombreux morts et blessés. Comment a-t-il été commémoré dans les années qui ont suivi ?", "doc_synopsis_2019": "Après avoir visionné A Taxi Driver dans un cinéma parisien, un groupe d'amis décide de se pencher sur les événements entourant le soulèvement de Gwangju du 18 mai 1980.", "doc_synopsis_2018": "En 1980, la fermeture de l'université Chonnam à Gwangju provoque un soulèvement étudiant massivement réprimé dans le sang. Ce documentaire retrace la généalogie des photographies qui ont façonné notre connaissance de l'événement.", "expo_title": "EXPOSITION", "page_title_gallery": "GALERIE DE PHOTOS", "gallery_sec_316": "Suite à l'assassinat du président Park Chung-hee en octobre 1979, la Corée du Sud entre dans une période d'incertitude politique. Des manifestations étudiantes réclamant la démocratie se propagent à travers le pays, notamment dans les universités de Gwangju.", "gallery_sec_1819": "Le 18 mai, des parachutistes sont déployés pour réprimer les manifestations à l'Université nationale de Chonnam. Leur réponse violente — frapper les étudiants et les passants sans distinction — provoque l'indignation et entraîne des dizaines de milliers de citoyens dans les rues.", "gallery_sec_2021": "Le soulèvement s'intensifie alors que les citoyens s'arment et prennent le contrôle de la ville. Le 21 mai, des soldats ouvrent le feu sur la foule devant le siège du gouvernement provincial, tuant des dizaines de personnes et marquant un tournant dans l'affrontement.", "gallery_sec_2226": "Après le retrait militaire du centre de Gwangju, les citoyens organisent un comité d'autogestion pour maintenir l'ordre, distribuer de la nourriture et négocier avec les autorités. La ville reste unie sous la menace imminente d'une répression.", "gallery_sec_27": "Aux premières heures du 27 mai, des dizaines de milliers de soldats reprennent la ville. Les derniers défenseurs barricadés dans le bâtiment du gouvernement provincial sont tués ou arrêtés. Le soulèvement est réprimé.", "gallery_sec_mourning": "Dans les semaines et les mois qui suivent, les victimes sont pleurées en privé tandis que le gouvernement supprime tout souvenir public des événements. Les familles recherchent les corps des disparus, et les survivants font face à l'emprisonnement et à la torture.", "gallery_sec_photographers": "Les photographies rassemblées ici ont été prises par des journalistes coréens, des correspondants étrangers et des photographes amateurs au péril de leur vie. Beaucoup d'images ont été confisquées ou cachées pendant des années avant d'entrer dans les archives publiques.", "gallery_label_316": "3–16 MAI", "gallery_label_1819": "18–19 MAI", "gallery_label_2021": "20–21 MAI", "gallery_label_2226": "22–26 MAI", "gallery_label_27": "27 MAI", "gallery_label_mourning": "DEUIL", "gallery_label_photographers": "PHOTOGRAPHES", "s2_quote_intro": "Le 20 mai, les journalistes du Jeonnam Maeil (aujourd'hui Gwangju Ilbo) soumettent leur démission collective. La lettre est concise, mais elle reflète parfaitement le sentiment de consternation et de révolte des journalistes :", "s2_quote": "« Nous l'avons vu. Nous avons vu de nos propres yeux des personnes traînées comme des chiens et mourir. Mais nous n'avons pu écrire une seule ligne dans le journal. C'est pourquoi nous posons nos plumes avec honte. »", "s3_p6": "Face à une résistance citoyenne acharnée, les troupes de la loi martiale se retirent du centre-ville dans l'après-midi du 21 mai. Elles bloquent ensuite les accès de Gwangju, isolant la ville du reste du monde.", "s4_p4b": "Les émeutes prévues par le régime ne se produisent pas. Gwangju réalise, même temporairement, le rêve du Daedong Sesang : une société fondée sur l'autonomie et la solidarité.", "s4_p4c": "Cependant, ce calme est de courte durée. À mesure que la vérité sur le massacre se répand et que la sympathie pour le soulèvement grandit, le nouveau régime militaire s'oriente vers une décision radicale : envoyer une force militaire massive à Gwangju. La perspective d'une répression sanglante devient de plus en plus palpable.", "s5_p2b": "En 1995, la loi spéciale sur le Mouvement démocratique du 18 mai permet la traduction en justice des anciens présidents Chun Doo-hwan et Roh Tae-woo.", "s5_p2c": "En 2011, les témoignages, les dossiers judiciaires, les photographies, les vidéos, les journaux, les carnets des reporters et les archives hospitalières liés aux événements du 18 mai sont inscrits au Registre de la Mémoire du monde de l'UNESCO.", "s5_p2d": "Bien que brutalement réprimée, la lutte des citoyens de Gwangju pour la démocratie demeure vivante. Elle continue de soutenir le processus de démocratisation en Corée du Sud et a laissé une marque durable sur des mouvements similaires à travers l'Asie.", "s6_p2b": "La place du 18 mai — anciennement la place du gouvernement provincial — est également régulièrement transformée en espace d'exposition en plein air. De grandes reproductions de photographies documentant le soulèvement et sa répression y sont exposées, permettant aux visiteurs de s'engager directement avec les archives photographiques de la ville et contribuant à la construction de l'identité urbaine de Gwangju.", "s6_p4b": "Plus récemment, de nombreux habitants de Gwangju se sont à nouveau mobilisés en réponse à la tentative du président Yoon Suk-yeol d'imposer la loi martiale le 3 décembre 2024. Le 4 décembre, parmi les foules rassemblées sur la place de la Démocratie, de nombreux survivants de la répression de 1980 se tenaient aux premiers rangs, déterminés à ce que le sacrifice de leurs camarades ne soit pas vain.", "s7_p1b": "Les événements de Gwangju ont d'abord été documentés par des photographes de presse coréens, parmi lesquels se distinguent Na Kyung-taek et Lee Chang-sung. Envoyés sur place par leurs journaux respectifs (Gwangju Ilbo et JoongAng Ilbo), ils ont enregistré les premiers moments du soulèvement.", "s7_p2b": "Ils ont ensuite été rejoints par des photographes travaillant pour des journaux basés à Séoul, puis par des journalistes étrangers. Parmi eux, Philippe Pons, correspondant du Monde à Tokyo, arrivé à Séoul le 20 mai et qui, à partir du 22 mai, a publié une série de rapports quotidiens depuis Gwangju.", "s7_p3b": "Plusieurs photographes internationaux étaient également présents, notamment Robin Moyer pour The Times, Norman Thorpe pour The Wall Street Journal, et les photographes français Patrick Chauvel et François Lochon. Tous deux appartenaient à de grandes agences photographiques — Sygma pour Chauvel et Gamma pour Lochon. Ils ont travaillé aux côtés de reporters de télévision, dont le cameraman Jürgen Hinzpeter, correspondant de la chaîne allemande ARD, arrivé à Gwangju le matin du 20 mai.", "s7_p4b": "En plus du travail considérable produit par ces photographes professionnels, dont beaucoup avaient l'expérience des zones de guerre, des contributions plus modestes d'amateurs ont également été apportées. Ces individus cherchaient à laisser un témoignage visuel des épreuves dont ils étaient témoins. Le pasteur Huntley en est un exemple : il a documenté l'afflux de victimes blessées et les actes de solidarité qui les entouraient depuis la salle des urgences de l'hôpital chrétien de Gwangju.", "s7_p5b": "Ces images révèlent non seulement les défis auxquels les photographes ont été confrontés, mais aussi la liberté relative dont beaucoup ont pu bénéficier. On les voit parfois travailler parmi les militaires, et d'autres fois au milieu des manifestants — contredisant l'hypothèse répandue selon laquelle ces photographies ont toujours été prises clandestinement sous la menace constante de la répression militaire.", "s7_p6b": "Bien que ces archives visuelles aient été soumises à la censure d'État jusqu'à la fin des années 1980, elles ont ensuite été mobilisées pour leur valeur probatoire, aidant à établir la réalité de la répression. Aujourd'hui, elles doivent également être considérées comme des objets historiques à part entière — dans le cadre d'une histoire photographique qui examine non seulement les images elles-mêmes, mais aussi les conditions de leur production, leur circulation et leurs diverses utilisations au fil du temps.", "expo_intro": "Explorez les archives visuelles de l'Exposition Gwangju 5.18."}, "ko": {"nav_home": "홈", "nav_exposition": "전시", "nav_gallery": "사진 갤러리", "nav_history": "역사", "nav_documentaries": "다큐멘터리", "nav_contact": "문의하기", "lang_html": "ko", "index_title": "광주 5.18", "index_subtitle": "도시 정체성과 민주적 투쟁", "index_intro": "전라남도의 옛 도청 소재지였던 도시 이름에 붙은 날짜로, 모든 한국의 민주주의자들에게는 불타는 듯한 단어이다. 여기에 모인 사진들이 기록하고 있는 사건들은 단지 며칠 동안, 즉 1980년 5월 18일부터 5월 27일까지의 기간에 일어난 일들이다. 그러나 그 중요성은 그 짧은 기간과는 반비례한다. 왜냐하면 광주 항쟁은 한국의 민주화 과정에서 중심적인 위치를 차지하고 있기 때문이다.", "block1_date": "5월<br>3-16일", "block1_text": "1979년 10월 26일 박정희 장군의 암살은 오랜 독재 통치 이후 한국 사회 전반에 걸친 대규모 요구와 항의의 움직임을 촉발했다. 당시 주요 요구 사항은 대학의 자치 보장, 계엄령 해제, 그리고 노동자의 기본권 보장이었다...", "block1_readmore": "더 읽기", "block2_date": "5월<br>18-19일", "block2_text": "5월 17일 밤, 군사 정권은 \"전국 계엄령 확대\"와 모든 대학의 휴교를 발표했다. 야당 정치인 24명과 수많은 민주화 운동 인사들이 체포되었다. 약 25,000명의 군인들이 전국 136개 지점에 배치되었다...", "block2_readmore": "더 읽기", "block3_date": "5월<br>20-21일", "block3_text": "5월 20일, 광주 시민들의 참여가 급격히 확대되면서 시위는 대규모 봉기로 발전했다. 오후 7시경, 1대의 트럭, 11대의 버스, 약 200대의 택시로 구성된 행렬이 금남로를 가득 메웠다...", "block3_readmore": "더 읽기", "block4_date": "5월<br>22-26일", "block4_text": "군대가 철수한 후, 광주를 외부와 연결하는 주요 도로는 차단되고 통신이 중단되어, 도시는 세상과 단절된 상태가 되었다. 그럼에도 불구하고 도시는 무너지지 않고 질서를 유지하며 스스로 조직을 꾸렸다...", "block4_readmore": "더 읽기", "block5_date": "5월<br>27일", "block5_text": "군사 정권은 미군의 승인도 얻은 뒤 제11공수여단과 제20사단을 투입하여 최종 진압 작전을 준비했다. 5월 26일, 군은 시민군에게 항복을 요구했으나, 많은 주민들은 도청을 지키며 끝까지 싸울 것을 다짐했다...", "block5_readmore": "더 읽기", "block6_date": "1980년<br>-현재", "block6_text": "광주에서 1980년 5월의 기억은 여전히 아물지 않은 상처로 남아 있으며, 참혹한 탄압의 희생자들을 기리는 기억 작업을 통해 생생하게 유지되고 있다. 이러한 기억은 도시 정체성의 중요한 구성 요소가 된다...", "block6_readmore": "더 읽기", "footer_title": "문의하기", "footer_desc": "프로젝트 및 아카이브에 관한 질문, 파트너십 또는 정보 문의.", "footer_name": "이름", "footer_email": "이메일", "footer_message": "메시지", "footer_send": "보내기", "history_title": "광주의<br>역사", "history_map": "사건 지도", "s1_title": "시위 (5월 3일~16일)", "s1_sub": "쿠데타와 민주주의에 대한 열망", "s1_p1": "1979년 10월 26일 박정희 장군의 암살은 오랜 독재 통치 이후 한국 사회 전반에 걸친 대규모 요구와 항의의 움직임을 촉발했다. 당시 주요 요구 사항은 대학의 자치 보장, 계엄령 해제, 그리고 노동자의 기본권 보장이었다.", "s1_p2": "그러나 이른바 '민주주의의 봄'은 1979년 12월 12일 전두환 장군이 권력을 장악한 새로운 군사 쿠데타에 부딪히며 좌절된다. 이후 요구는 더욱 강해졌고, 시민들의 동원과 시위도 새로운 국면을 맞이한다.", "s1_p3": "5월 10일, 전국 학생회 대표들은 계엄령 해제와 전두환의 사퇴를 요구했다. 며칠 뒤인 5월 15일에는 수십만 명이 서울에서 대규모 시위에 참여했다. 그러나 군의 개입 가능성이 높고 시민 참여가 충분히 확대되지 못하면서 운동은 점차 동력을 잃게 된다.", "s1_p4": "반면 광주에서는 상황이 달랐다. 1894~1895년 동학농민운동 이래 중앙 권력에 대한 저항의 전통을 지닌 도시이자, 김대중이라는 대표적 야당 지도자의 고향이기도 했다.", "s1_p5": "이곳에서는 전남대학교와 조선대학교가 시위의 선두에 섰다. 5월 8일부터 16일까지 이들은 '민주화를 위한 집회'를 주도했으며, 이는 학생들뿐 아니라 더 넓은 시민 사회로 빠르게 확산되었다.", "s1_p6": "5월 16일, 수만 명의 시민이 전라남도 도청 앞에 평화롭게 모여 비상계엄 해제와 군부의 퇴진을 요구했다. 광주의 학생들은 5월 19일 전남대학교 정문 앞에서 다시 모이기로 결정했다.", "s1_p7": "그러나 5월 17일 자정, 군사 정권은 계엄령을 전국으로 확대하고 정치인, 반대 인사, 학생 지도자들을 대규모로 체포했다.", "s1_p8": "이 중대한 결정이 바로 5월 18일 봉기의 직접적인 계기가 되었다.", "s2_title": "탄압 (5월 18일~19일)", "s2_sub": "탄압에서 대치로", "s2_p1": "5월 17일 밤, 군사 정권은 \"전국 계엄령 확대\"와 모든 대학의 휴교를 발표했다. 야당 정치인 24명과 수많은 민주화 운동 인사들이 체포되었다.", "s2_p2": "특히 공수부대, 제20사단, 해병대 등 약 25,000명의 군인들이 전국 136개 지점에 배치되었고, 5월 18일 하루만 해도 549명이 체포되었고, 이 중 227명이 학생이었다.", "s2_p3": "5월 18일 광주에서는 학생들이 공수부대의 철수를 요구하는 시위를 조직했다. 새벽 2시 30분경, 제7공수여단과 제31사단이 전남대학교, 조선대학교, 그리고 8개의 다른 전문대학에 투입되었다. 첫 충돌은 오전 전남대학교 정문 앞에서 발생했다.", "s2_p4": "오후에는 공수부대가 금남로와 충장로 거리를 진입하며, 행인들을 구분 없이 구타하고 체포했다. 하루 동안 400명 이상이 체포되었고, 많은 부상자가 발생했다.", "s2_p5": "5월 19일, 분노에 불타는 시민들은 다시 시내 중심에 집결했다. 군은 최루탄을 사용하고 청년들을 구분 없이 체포하며 구타한 뒤, 때로는 옷을 벗긴 상태로 군용 트럭에 태워 이동시켰다.", "s2_p6": "이러한 대치는 분노를 증폭시키고, 공포는 저항으로 바뀌었다. 충돌은 점점 더 격렬해졌다.", "s3_title": "봉기 (5월 20일~21일)", "s3_sub": "억압에서 봉기로", "s3_p1": "5월 20일, 광주 시민들의 참여가 급격히 확대되면서 시위는 대규모 봉기로 발전했다. 오후 7시경, 1대의 트럭, 11대의 버스, 약 200대의 택시로 구성된 행렬이 금남로를 가득 메웠다. 전조등은 켜지고 경적이 울리며, 이들은 도청 건물로 향했다.", "s3_p2": "언론의 침묵에 대응해, 일부 시위대는 MBC와 KBS 방송국을 습격하고 불을 질렀다. 저녁에는 광주역에서 격렬한 충돌이 발생했다. 여기서 첫 총격이 발생하여 민간인 7명이 사망하고 다수가 부상했다.", "s3_p3": "5월 21일 새벽, 전날 충돌로 사망한 시위대 2명의 시신이 국기(태극기)로 덮인 채 수레에 실려 금남로로 옮겨졌다. 시신의 등장은 군중을 고무시켰고, 봉기는 절정에 이르렀다. 군 참모본부는 최고 경계 태세인 '진돗개 1호'를 발령했다.", "s3_p4": "오후 1시경, 제11공수여단이 시위대에 총격을 가했다. 이에 맞서 시민들은 나주와 화순 인근 민방위 창고에서 소총을 확보하며 무장했다. 이날 하루만 해도 45명의 민간인이 사망하고 수백 명이 부상당했다.", "s3_p5": "시민들의 끈질긴 저항에 맞서 계엄군은 5월 21일 오후 시내 중심에서 철수했다. 이후 광주의 주요 진입로를 차단하며 도시를 외부와 고립시켰다.", "s4_title": "저항 (5월 22일~26일)", "s4_sub": "군사 봉쇄, 무장 투쟁과 시민 연대", "s4_p1": "군대가 철수한 후, 광주를 외부와 연결하는 주요 도로는 차단되고 통신이 중단되어, 도시는 세상과 단절된 상태가 되었다. 그럼에도 불구하고 도시는 무너지지 않고 질서를 유지하며 스스로 조직을 꾸렸다.", "s4_p2": "매일 수만 명의 시민이 도청 앞에 모여 민주주의 수호를 위한 집회를 열었다. 시민들은 헌혈에 참여했고, 상인과 여성들은 길을 지나가는 사람들에게 식사를 나눠 주었다. 광주는 도둑질과 범죄가 없는 도시가 되었다.", "s4_p3": "새 군사 정권의 엄격한 통제 아래, 국내 언론은 시민들을 '폭도'로 규정했다. 그러나 위험을 무릅쓴 외신 기자들은 광주에 들어와 시민들이 질서를 유지하며 민주주의를 요구하고 있음을 보도했다.", "s4_p4": "정권이 예상했던 폭동은 일어나지 않았다. 광주는 잠시나마 대동세상의 꿈을 실현했다. 하지만 이러한 평온은 오래가지 못했다. 곧 광주에 대규모 군사력을 투입하려는 계획이 현실화되었다.", "s5_title": "진압 (5월 27일)", "s5_sub": "최후의 격돌과 5·18의 유산", "s5_p1": "군사 정권은 미군의 승인도 얻은 뒤 제11공수여단과 제20사단을 투입하여 최종 진압 작전을 준비했다. 5월 26일, 군은 시민군에게 항복을 요구했으나, 많은 주민들은 도청을 지키며 끝까지 싸울 것을 다짐했다.", "s5_p2": "5월 27일 오전, 군의 재진입 작전이 시작되었다. 시민군 17명이 사망하고 약 300명이 무장 해제되었다. 10일간의 봉기 끝에 총 166명이 사망했으며, 약 5,000명이 부상하거나 체포되었다.", "s5_p3": "5·18의 울림은 1987년 6월 항쟁에서 다시 이어졌다. 1995년에는 5·18 민주화운동 특별법이 제정되어 전두환, 노태우 전 대통령이 사법 처리되었다. 2011년에는 5·18 관련 기록물들이 유네스코 세계기록유산으로 등재되었다.", "s5_p4": "피로 억압당했지만, 광주 시민들의 민주주의를 향한 투쟁은 여전히 살아 있으며, 한국의 민주화 과정에 기여하고 아시아 전역의 유사한 운동에도 깊은 영향을 남겼다.", "s6_title": "애도", "s6_sub": "기억과 도시 정체성", "s6_p1": "광주에서 1980년 5월의 기억은 여전히 아물지 않은 상처로 남아 있으며, 참혹한 탄압의 희생자들을 기리는 기억 작업을 통해 생생하게 유지되고 있다. 이러한 기억은 도시 정체성의 중요한 구성 요소가 된다.", "s6_p2": "5·18 광장에 면한 전일빌딩에는 당시 군 헬리콥터가 시위대를 향해 발사한 기관총 자국이 남아 있으며, 현재는 여러 층에 걸쳐 박물관이 운영되고 있다. 또한 5·18 광장의 시계는 매일 오전 5시 18분에 '사랑하는 이들의 행진'을 울린다.", "s6_p3": "광주를 찾는 관광객들은 금남로에서 출발해 망월동 묘지, 그리고 자유공원으로 조성된 상무 군사형무소 박물관에 이르는 코스를 제공받는다.", "s6_p4": "최근에도 많은 광주 시민들이 2024년 12월 3일 윤석열 대통령의 계엄령 시도에 맞서 다시 모였다. 12월 4일 민주광장에 모인 시민들 중에는 당시 탄압을 겪은 생존자들이 앞줄에 서 있었다.", "s7_title": "사진 기록", "s7_sub": "역사적 증언과 증거적 활용", "s7_p1": "광주 사건은 처음에 한국 언론 사진기자들에 의해 취재되었으며, 그중에서도 나경택과 이창성이 선두에 있었다. 이들은 각각 전남일보와 중앙일보 소속으로 현장에 투입되어 봉기의 초기 순간을 기록했다.", "s7_p2": "이어 서울 언론사 사진기자들과 외신 기자들이 합류했다. 대표적인 사례로 필립 폰스(Le Monde 도쿄 특파원)가 있으며, 그는 5월 20일 서울에 있다가 22일부터 광주에서 매일 기사를 작성했다.", "s7_p3": "외신 사진기자들도 현장에 있었다. 로빈 모이어(Times), 노먼 소프(Wall Street Journal), 그리고 프랑스의 파트릭 쇼벨과 프랑수아 로숑이 그들이다. 이들은 독일 ARD 방송의 카메라맨 위르겐 힌슈페터와 함께 활동했다.", "s7_p4": "이처럼 전문 사진기자들이 남긴 방대한 기록 외에도, 단순한 아마추어 사진가들의 기록도 존재한다. 예를 들어, 헌틀리 목사는 광주 기독병원 응급실에서 부상자들의 유입과 연대의 모습을 기록했다.", "s7_p5": "국가 검열이 1980년대 말까지 이어졌음에도, 이 수많은 기록은 이후 탄압의 실체를 입증하는 증거로 활용되었다. 이제 이 사진들은 단순한 기록을 넘어, 사진 제작의 조건, 활용 방식, 그리고 유통 과정까지 함께 조망해야 할 역사적 자료로 평가된다.", "gallery_title": "사진 갤러리", "gallery_filter_all": "전체", "doc_title": "다큐멘터리", "doc_about_title": "프로젝트 소개", "doc_about": "2013년부터 프랑스 구스타브 에펠 대학교 웹 문화 및 직업 석사 과정 학생들과 부산 동의대학교 영상미디어 기술학과 학생들이 매년 인터랙티브 다큐멘터리를 공동 제작해 왔습니다. 이 파트너십은 2019년 두 대학 간의 복수학위 프로그램으로 이어졌습니다.", "doc_synopsis_2024": "진실이 개인의 감수성에 좌우되고 이미지가 설득력을 갖는 세상에서, 아카이브 영상으로 어떻게 한국 민주주의 탄생의 서사를 구축할 수 있을까요?", "doc_synopsis_2023": "광주 항쟁의 역사는 생존자들의 기억으로 쓰여집니다. 이 다큐멘터리는 노래, 그림, 글을 통해 공유된 트라우마를 담아내는 예술가들을 따라갑니다.", "doc_synopsis_2021": "광주 사건 40년 후, 한 편의 슈퍼 16mm 필름이 5·18 봉기의 시각 자료를 풍부하게 합니다. 이 필름, 그 작가, 그 여정, 의도, 감정에서 무엇이 남아 있을까요?", "doc_synopsis_2020": "1980년 광주의 학생과 시민들은 민주주의와 자유를 위해 봉기했습니다. 잔인하게 진압된 이 봉기는 어떻게 기념되어 왔을까요? 한국의 기억과 사회에서 어떤 위치를 차지할까요?", "doc_synopsis_2019": "파리의 한 영화관에서 '택시운전사'를 본 후, 친구들 그룹이 1980년 5월 18일 광주 항쟁을 둘러싼 사건들을 조사하기로 결심합니다.", "doc_synopsis_2018": "1980년 광주 전남대학교 폐쇄는 유혈 진압된 학생 봉기를 촉발했습니다. 이 다큐멘터리는 사건에 대한 우리의 지식을 형성한 사진들의 계보를 추적합니다.", "expo_title": "전시", "page_title_gallery": "사진 갤러리", "gallery_sec_316": "1979년 10월 박정희 대통령 암살 이후, 한국은 정치적 불안의 시기로 접어들었다. 민주주의를 요구하는 학생 시위가 전국으로 확산되었으며, 특히 광주의 대학교들에서 거세게 일어났다.", "gallery_sec_1819": "5월 18일, 전남대학교 시위를 진압하기 위해 공수부대가 투입되었다. 학생과 행인들을 무차별적으로 구타하는 잔혹한 진압은 시민들의 분노를 불러일으켰고, 수만 명이 거리로 나서게 했다.", "gallery_sec_2021": "시민들이 무장하고 도시를 장악하면서 봉기는 격화되었다. 5월 21일, 도청 앞에서 군인들이 군중에게 총격을 가해 수십 명이 사망하며 대치의 전환점이 되었다.", "gallery_sec_2226": "군이 광주 도심에서 철수한 후, 시민들은 자치위원회를 조직해 질서를 유지하고 식량을 나누며 당국과 협상했다. 도시는 임박한 진압의 그림자 속에서도 하나로 버텼다.", "gallery_sec_27": "5월 27일 이른 새벽, 수만 명의 계엄군이 도시를 탈환했다. 도청 안에 바리케이드를 치고 버티던 마지막 수호자들은 사살되거나 체포되었다. 봉기는 진압되었다.", "gallery_sec_mourning": "이후 몇 주, 몇 달 동안 희생자들은 조용히 애도되었고, 정부는 사건에 대한 모든 공적 기억을 억압했다. 가족들은 실종자의 시신을 찾아 헤맸고, 생존자들은 투옥과 고문에 시달렸다.", "gallery_sec_photographers": "여기에 모인 사진들은 한국 기자들, 외국 특파원들, 그리고 아마추어 사진가들이 큰 위험을 무릅쓰고 촬영한 것이다. 많은 이미지들이 압수되거나 수십 년간 숨겨져 있다가 공식 기록으로 남게 되었다.", "gallery_label_316": "5월 3–16일", "gallery_label_1819": "5월 18–19일", "gallery_label_2021": "5월 20–21일", "gallery_label_2226": "5월 22–26일", "gallery_label_27": "5월 27일", "gallery_label_mourning": "애도", "gallery_label_photographers": "사진 기자들", "s2_quote_intro": "5월 20일, 전남매일(현 광주일보) 기자들이 집단 사표를 제출했다. 짧은 편지였지만, 기자들의 절망과 분노가 고스란히 담겨 있었다:", "s2_quote": "\"우리는 보았다. 눈으로 직접 사람들이 개처럼 끌려가 죽는 것을 보았다. 그러나 신문에 단 한 줄도 쓸 수 없었다. 그래서 부끄러움으로 펜을 내려놓는다.\"", "s3_p6": "시민들의 끈질긴 저항에 맞서 계엄군은 5월 21일 오후 시내 중심에서 철수했다. 이후 광주의 주요 진입로를 차단하며 도시를 외부와 고립시켰다.", "s4_p4b": "정권이 예상했던 폭동은 일어나지 않았다. 광주는 잠시나마 대동세상의 꿈을 실현했다 — 자치와 연대에 기반한 사회.", "s4_p4c": "그러나 이러한 평온은 오래가지 못했다. 학살의 진실이 알려지고 봉기에 대한 공감이 커지면서, 새 군사 정권은 과감한 결정을 내린다: 대규모 군사력을 광주에 투입하는 것. 유혈 진압의 전망이 점점 현실화되어 갔다.", "s5_p2b": "1995년, 5·18 민주화운동 특별법이 제정되어 전두환, 노태우 전 대통령이 사법 처리되었다.", "s5_p2c": "2011년에는 5·18 관련 증언, 사법 기록, 사진, 영상, 신문, 기자 수첩, 병원 기록 등이 유네스코 세계기록유산으로 등재되었다.", "s5_p2d": "피로 억압당했지만, 광주 시민들의 민주주의를 향한 투쟁은 여전히 살아 있다. 이는 한국의 민주화 과정에 기여하고 아시아 전역의 유사한 운동에도 깊은 영향을 남겼다.", "s6_p2b": "5·18 광장(과거 전라남도 도청 광장)은 야외 전시 공간으로 자주 활용된다. 봉기와 그 진압을 기록한 사진의 대형 복제본이 전시되어 시민들이 도시의 사진 기록과 직접 만날 수 있으며, 광주의 도시 정체성 형성에 기여하고 있다.", "s6_p4b": "최근에도 많은 광주 시민들이 2024년 12월 3일 윤석열 대통령의 계엄령 시도에 맞서 다시 모였다. 12월 4일 민주광장에 모인 시민들 중에는 1980년 탄압의 생존자들이 앞줄에 서서 동료들의 희생이 헛되지 않도록 다짐했다.", "s7_p1b": "광주 사건은 처음에 한국 언론 사진기자들에 의해 기록되었으며, 그 중 나경택과 이창성이 두드러진다. 각자의 신문사(광주일보, 중앙일보)에 파견되어 봉기의 초기 순간을 기록했다.", "s7_p2b": "이후 서울 신문사 사진기자들이 합류했고, 외국 기자들도 뒤따랐다. 그 중 르몽드 도쿄 특파원 필립 폰스는 5월 20일 서울에 도착해 22일부터 광주에서 일일 보고를 연재했다.", "s7_p3b": "여러 국제 사진기자들도 현장에 있었다: 타임스의 로빈 모이어, 월스트리트저널의 노먼 소프, 프랑스 사진기자 파트릭 쇼벨과 프랑수아 로숑. 두 사람은 각각 시그마, 감마 소속이었다. 이들은 독일 ARD 방송 카메라맨 위르겐 힌슈페터와 함께 활동했으며, 그는 5월 20일 아침 광주에 도착했다.", "s7_p4b": "전문 사진기자들의 방대한 작업 외에도, 아마추어 사진가들의 소박한 기록도 남아 있다. 이들은 목격한 참상을 시각적으로 기록하고자 했다. 헌틀리 목사는 광주 기독병원 응급실에서 부상자들의 유입과 주변의 연대 장면을 기록한 대표적인 사례다.", "s7_p5b": "이 이미지들은 사진기자들이 직면한 어려움뿐 아니라 그들이 누린 상대적 자유도 보여준다. 군인들 사이에서 촬영하는 모습도, 시위대 한복판에서 작업하는 모습도 볼 수 있다 — 이 사진들이 항상 군의 위협 속에 몰래 촬영되었다는 통념을 뒤집는다.", "s7_p6b": "이 시각 기록들은 1980년대 말까지 국가 검열을 받았지만, 이후 진압의 실체를 입증하는 증거로 활용되었다. 오늘날 이것들은 단순한 기록을 넘어, 이미지 자체뿐 아니라 그 제작 조건, 유통 과정, 시간에 따른 다양한 활용을 함께 살펴야 할 역사적 유산으로 평가받는다.", "expo_intro": "광주 5.18 전시의 시각 아카이브를 탐색하세요."}};

  function getLang(){try{return localStorage.getItem(STORAGE_KEY)||DEFAULT_LANG;}catch(e){return DEFAULT_LANG;}}
  function setLang(l){try{localStorage.setItem(STORAGE_KEY,l);}catch(e){}}

  function apply(lang){
    var t=T[lang];if(!t)return;
    document.documentElement.lang=t.lang_html||lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var k=el.getAttribute('data-i18n');
      if(t[k]!==undefined)el.innerHTML=t[k];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
      var k=el.getAttribute('data-i18n-placeholder');
      if(t[k]!==undefined)el.placeholder=t[k];
    });
    document.querySelectorAll('.lang-selector span').forEach(function(span){
      var sl=span.getAttribute('data-lang');
      span.classList.toggle('active',sl===lang);
      span.setAttribute('aria-current',sl===lang?'true':'false');
    });
    // Gallery section labels/descs
    var galMap={'3\u201316 MAY':{d:'gallery_sec_316',l:'gallery_label_316'},'18\u201319 MAY':{d:'gallery_sec_1819',l:'gallery_label_1819'},'20\u201321 MAY':{d:'gallery_sec_2021',l:'gallery_label_2021'},'22\u201326 MAY':{d:'gallery_sec_2226',l:'gallery_label_2226'},'27 MAY':{d:'gallery_sec_27',l:'gallery_label_27'},'MOURNING':{d:'gallery_sec_mourning',l:'gallery_label_mourning'},'PHOTOGRAPHERS':{d:'gallery_sec_photographers',l:'gallery_label_photographers'}};
    document.querySelectorAll('[data-gallery-label]').forEach(function(el){var s=el.getAttribute('data-gallery-label');var k=galMap[s];if(k&&t[k.l])el.textContent=t[k.l];});
    document.querySelectorAll('[data-gallery-desc]').forEach(function(el){var s=el.getAttribute('data-gallery-desc');var k=galMap[s];if(k&&t[k.d])el.textContent=t[k.d];});
  }

  window.switchLang=function(lang){
    setLang(lang);
    if (typeof renderGallery === 'function') {
      renderGallery();
    }
    apply(lang);
    if (typeof updateModal === 'function' && document.getElementById('photoModal') && document.getElementById('photoModal').classList.contains('open')) {
      updateModal();
    }
  };
  window.__i18nTranslations=T;
  window.__i18nApply=function(){apply(getLang());};

  function init(){
    apply(getLang());
  }
  function boot() {
    init();
    if (typeof renderGallery === 'function') {
      renderGallery();
    }
    apply(getLang());
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    // Scripts already parsed (e.g. injected dynamically)
    boot();
  }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Gwangju 5.18</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        .lang-selector span { cursor: pointer; padding: 2px 6px; opacity: 0.5; transition: opacity 0.2s; }
        .lang-selector span:hover,
        .lang-selector span.active { opacity: 1; font-weight: 700; }
        .gallery-section {
            margin-bottom: 64px;
            width: 100%;
        }

        .section-desc {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            text-align: justify;
            margin: 8px 0 32px 0;
            width: 100%;
            max-width: none;
            box-sizing: border-box;
        }
        .section-label {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #999;
            border-top: 2px solid #000;
            padding-top: 14px;
            margin-bottom: 20px;
            width: 100%;
            max-width: none;
            display: block;
            box-sizing: border-box;
        }

        /* ── Grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
            background: #111;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s ease, filter 0.2s ease;
            will-change: transform;
            filter: grayscale(20%);
        }

        .grid-item:hover img {
            transform: scale(1.04);
            filter: grayscale(0%);
        }

        /* Hover overlay */
        .hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: flex-end;
            padding: 14px;
            transition: background 0.2s ease;
        }

        .grid-item:hover .hover-overlay {
            background: rgba(0,0,0,0.55);
        }

        .hover-caption {
            font-size: 11px;
            color: #fff;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .grid-item:hover .hover-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 1000;
            align-items: center;
            justify-content: center;

            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;

            position: relative;
            max-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #expandedImg {
            max-height: 75vh;
            max-width: calc(100vw - 160px);
            object-fit: contain;
            display: block;
        }

        .modal-prev, .modal-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 22px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            z-index: 10;
        }

        .modal-prev { left: 16px; }
        .modal-next { right: 16px; }
        .modal-prev:hover, .modal-next:hover { background: rgba(255,255,255,0.25); }

        .modal-meta {
            margin-top: 14px;

            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: calc(100vw - 160px);

        .modal-caption {

            line-height: 1.6;
            text-align: center;

        .modal-counter {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #555;

            background: none;
            border: none;
            line-height: 1;
        }

    function getPhotoDesc(imgKey, lang) {
      if (lang && PHOTO_CAPTIONS[lang] && PHOTO_CAPTIONS[lang][imgKey]) {
        return PHOTO_CAPTIONS[lang][imgKey];
      }
      return null;
    }

    function getCurrentLang() {
      try { return localStorage.getItem('gwangju_lang') || 'en'; } catch(e) { return 'en'; }
    }

    // Format caption: <strong>Author</strong>, <em>Description + date + format</em>, source
    function formatCaption(rawDesc) {
      if (!rawDesc) return '';
      // Strip surrounding quotes if the whole string is wrapped in them
      var desc = rawDesc.trim();
      if (desc.charAt(0) === '"' && desc.charAt(desc.length - 1) === '"') {
        desc = desc.slice(1, -1).trim();
      }
      var parts = desc.split(', ');
      if (parts.length < 2) {
        return '<em>' + desc + '</em>';
      }
      var author = parts[0];
      // Capitalize first letter of description (part after author)
      var restParts = parts.slice(1);
      if (restParts.length > 0 && restParts[0].length > 0) {
        restParts[0] = restParts[0].charAt(0).toUpperCase() + restParts[0].slice(1);
      }
      if (restParts.length === 1) {
        return '<strong>' + author + '</strong>, <em>' + restParts[0] + '</em>';
      }
      // 2+ remaining parts: last is source (normal weight), middle is italic
      var source = restParts[restParts.length - 1];
      var middle = restParts.slice(0, restParts.length - 1).join(', ');
      return '<strong>' + author + '</strong>, <em>' + middle + '</em>, ' + source;
    }

    function renderGallery() {
    document.getElementById('gallery-root').innerHTML = '';
    const sectionOrder = [];
    const sectionMap = {};
    PHOTOS.forEach((p, i) => {
        if (!sectionMap[p.section]) {
            sectionMap[p.section] = [];
            sectionOrder.push(p.section);
        }
        sectionMap[p.section].push({...p, globalIndex: i});
    });

    const root = document.getElementById('gallery-root');
    sectionOrder.forEach(sec => {
        const wrap = document.createElement('div');
        wrap.className = 'gallery-section';
        const idMap = {
            '3–16 MAY': 'section-3-16',
            '18–19 MAY': 'section-18-19',
            '20–21 MAY': 'section-20-21',
            '22–26 MAY': 'section-22-26',
            '27 MAY': 'section-27',
            'MOURNING': 'section-mourning',
            'PHOTOGRAPHERS': 'section-photographers'
        };
        if (idMap[sec]) wrap.id = idMap[sec];

        // Section key mapping for i18n
        const sectionKeyMap = {
            '3–16 MAY':   { desc: 'gallery_sec_316',    label: 'gallery_label_316' },
            '18–19 MAY':  { desc: 'gallery_sec_1819',   label: 'gallery_label_1819' },
            '20–21 MAY':  { desc: 'gallery_sec_2021',   label: 'gallery_label_2021' },
            '22–26 MAY':  { desc: 'gallery_sec_2226',   label: 'gallery_label_2226' },
            '27 MAY':       { desc: 'gallery_sec_27',     label: 'gallery_label_27' },
            'MOURNING':     { desc: 'gallery_sec_mourning',     label: 'gallery_label_mourning' },
            'PHOTOGRAPHERS':{ desc: 'gallery_sec_photographers', label: 'gallery_label_photographers' }
        };

        function getT(key) {
            try {
                const lang = localStorage.getItem('gwangju_lang') || 'en';
                if (window.__i18nTranslations && window.__i18nTranslations[lang] && window.__i18nTranslations[lang][key]) {
                    return window.__i18nTranslations[lang][key];
                }
            } catch(e) {}
            return key;
        }

        const label = document.createElement('div');
        label.className = 'section-label';
        const secKeys = sectionKeyMap[sec];
        label.textContent = secKeys ? getT(secKeys.label) : sec;
        label.setAttribute('data-gallery-label', sec);
        wrap.appendChild(label);

        if (secKeys && secKeys.desc) {
            const desc = document.createElement('p');
            desc.className = 'section-desc';
            desc.textContent = getT(secKeys.desc);
            desc.setAttribute('data-gallery-desc', sec);
            wrap.appendChild(desc);
        }

        const grid = document.createElement('div');
        grid.className = 'photo-grid';

        const _currentLang = getCurrentLang();
        sectionMap[sec].forEach(p => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            const _lang = _currentLang;
            const _desc = getPhotoDesc(p.img, _lang) || p.desc;
            const _descFormatted = formatCaption(_desc);
            const _descPlain = _desc.replace(/<[^>]*>/g, '');
            item.innerHTML = `
                <img src="${p.img}" alt="${_descPlain.substring(0,60)}" loading="lazy">
                <div class="hover-overlay">
                    <span class="hover-caption">${_descFormatted}</span>
                </div>`;
            item.setAttribute('tabindex', '0');
            item.setAttribute('role', 'button');
            item.setAttribute('aria-label', 'View photo: ' + _descPlain.substring(0, 80));
            item.addEventListener('click', () => openModal(p.globalIndex));
            item.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(p.globalIndex); }
            });
            grid.appendChild(item);
        });

        wrap.appendChild(grid);
        root.appendChild(wrap);
    });

    // Re-apply i18n translations to freshly rendered gallery sections
    if (window.__i18nApply) { window.__i18nApply(); }
    else { document.addEventListener('i18nReady', function() { if (window.__i18nApply) window.__i18nApply(); }, {once: true}); }
    } // end renderGallery

    // renderGallery is called by the IIFE boot() after DOMContentLoaded,
    // at which point this script is already parsed and renderGallery is defined.

    let currentIndex = 0;

    function openModal(index) {
        window._lastFocused = document.activeElement;
        currentIndex = index;
        updateModal();
        document.getElementById('photoModal').classList.add('open');
        document.addEventListener('keydown', handleKey);
    }

    function closeModal() {
        // return focus to the item that opened the modal
        if (window._lastFocused) { window._lastFocused.focus(); window._lastFocused = null; }
        document.getElementById('photoModal').classList.remove('open');
        document.removeEventListener('keydown', handleKey);
    }

    function navigate(dir) {
        currentIndex = (currentIndex + dir + PHOTOS.length) % PHOTOS.length;
        updateModal();
    }

    function updateModal() {
        const p = PHOTOS[currentIndex];
        var _mlang = getCurrentLang();
        const _mdesc = (getPhotoDesc(p.img, _mlang)) || p.desc;
        const _mformatted = formatCaption(_mdesc);
        document.getElementById('expandedImg').src = p.img;
        document.getElementById('expandedImg').alt = _mdesc.replace(/<[^>]*>/g, '');
        document.getElementById('modal-description').innerHTML = _mformatted;
        document.getElementById('modal-counter').textContent =
            (currentIndex + 1) + ' / ' + PHOTOS.length;
    }

    function handleKey(e) {
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'Escape') closeModal();
    }

    document.getElementById('photoModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    window.addEventListener('load', () => {
        if (location.hash && location.hash.startsWith('#photo-')) {
            const photoName = location.hash.replace('#photo-', '') + '.jpg';
            const idx = PHOTOS.findIndex(p => p.img === photoName);
            if (idx !== -1) openModal(idx);
        }
    });
    </script>

    <script>
        // Disable right-click
        document.addEventListener('contextmenu', e => e.preventDefault());
        // Disable drag on images
        document.addEventListener('dragstart', e => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });
    </script>
    <style>
        img {
            -webkit-user-drag: none;
            pointer-events: none;
        }
        /* Re-enable pointer events on interactive wrappers */
        .grid-item, .image-wrapper, .expo-thumb {
            pointer-events: auto;
        }
    </style>


    <script>
    /* ── Hamburger menu ── */
    (function() {
        var btn = document.querySelector('.hamburger');
        var menu = document.getElementById('nav-menu');
        if (!btn || !menu) return;
        btn.addEventListener('click', function() {
            var open = menu.classList.toggle('open');
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            btn.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && menu.classList.contains('open')) {
                menu.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
                btn.setAttribute('aria-label', 'Open navigation menu');
                btn.focus();
            }
        });
    })();
    </script>
</body>
</html>
